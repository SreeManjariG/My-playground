<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2a4858" />
  <title>Quest Haven</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%232a4858'/%3E%3Cpath d='M18 56 Q50 18 82 56 Z' fill='%23d4654a'/%3E%3Crect x='28' y='52' width='44' height='34' fill='%23f4e2c0'/%3E%3C/svg%3E" />
  <style>
    :root{
      --ink:#3a2e24; --ink-dim:#7d6d5a; --cream:#fdf6e8; --cream2:#f6ecd6;
      --rose:#d4654a; --rose-deep:#b84e36; --sage:#6f9a5e; --gold:#e0a93f;
      --sky:#7fb8d4; --pond:#4a90a8; --line:#e6d6b8;
    }
    *{ -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
    html,body{ margin:0; padding:0; background:#e8dcc0; -webkit-text-size-adjust:100%;
      font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif; color:var(--ink); }
    #root{ max-width:560px; margin:0 auto; min-height:100vh; }
    .boot{ font-style:italic; color:var(--ink-dim); text-align:center; padding:70px 20px; }
    .err{ font-style:normal; color:#8a4a3a; padding:40px 22px; line-height:1.6; }
  </style>
</head>
<body>

  <script>
    window.__err=function(m){var r=document.getElementById('root');if(r)r.innerHTML=
      '<div class="err"><div style="font-size:18px;font-style:italic;margin-bottom:10px">Something went wrong</div>'
      +'<div style="font-size:13px;color:#9a866f">'+m+'</div>'
      +'<div style="font-size:12px;color:#b0a088;margin-top:16px">Open in Safari or Chrome with an internet connection.</div></div>';};
    window.addEventListener('error',function(e){if(window.__booted)return;window.__err((e&&e.message)?e.message:'Script error.');});
  </script>

  <!-- React + Babel + Firebase from CDN, with jsDelivr fallback -->
  <script>
    function loadScript(urls,cb){var i=0;(function next(){
      if(i>=urls.length){window.__err('Could not download a required library ('+urls[0]+').');return;}
      var s=document.createElement('script');s.src=urls[i];s.crossOrigin='anonymous';
      s.onload=cb;s.onerror=function(){i++;next();};document.head.appendChild(s);})();}

    loadScript(['https://unpkg.com/react@18/umd/react.production.min.js',
                'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js'],function(){
    loadScript(['https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
                'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js'],function(){
    loadScript(['https://unpkg.com/@babel/standalone/babel.min.js',
                'https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js'],function(){
      // Firebase (optional — app still runs locally if these fail or keys are blank)
      var fbBase='https://www.gstatic.com/firebasejs/10.12.2/';
      function tryFirebase(done){
        loadScript([fbBase+'firebase-app-compat.js'],function(){
        loadScript([fbBase+'firebase-auth-compat.js'],function(){
        loadScript([fbBase+'firebase-firestore-compat.js'],function(){ done(true); });});});
      }
      tryFirebase(function(){ startApp(); });
      // if firebase fails to load at all, still start (local mode)
      setTimeout(function(){ if(!window.__booted) startApp(); }, 6000);
    });});});

    var __started=false;
    function startApp(){
      if(__started)return; __started=true;
      try{
        if(!window.React||!window.ReactDOM||!window.Babel){window.__err('Libraries did not initialize. Refresh.');return;}
        var code=document.getElementById('app-code').textContent;
        var out=Babel.transform(code,{presets:[['react',{runtime:'classic'}]],sourceType:'script'}).code;
        (0,eval)(out);
        window.__booted=true;
      }catch(err){window.__err((err&&err.message)?err.message:String(err));}
    }
  </script>

  <script type="text/plain" id="app-code">
const { useState, useEffect, useRef } = React;
/* ============================================================
   QUEST HAVEN — fantasy-realism cottagecore productivity world.
   Click the gatcha to draw a random quest. Login + cloud sync
   via Firebase (falls back to local-only if not configured).
   ============================================================ */

const SECTIONS = {
  reading:      { label: "Reading",      color: "#c98a4a", reward: "a book on the shelf" },
  business:     { label: "Business",     color: "#5a9e6a", reward: "coins of your choice in the vault" },
  relationships:{ label: "Relationships",color: "#d4658a", reward: "a flower blooming in the garden" },
  fitness:      { label: "Fitness",      color: "#e0a93f", reward: "100 XP toward a trophy" },
  environment:  { label: "Environment",  color: "#5aa0c0", reward: "a lantern lit along the path" },
  spirituality: { label: "Spirituality", color: "#a06fd0", reward: "a lotus opening on the stream" },
};
const SECTION_KEYS = Object.keys(SECTIONS);

const blankState = () => ({
  tasks: [], shuffle: [], books: [], coins: 0, plants: 0, xp: 0, lights: 0, lotuses: 0, history: [],
});

let _id = 0;
const uid = () => `t${Date.now()}_${_id++}`;
function shuffleArray(a){ const arr=[...a]; for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

/* ---------------- storage layer: firebase if configured, else localStorage ---------------- */
const HAS_FIREBASE = (function(){
  try{
    const c = window.FIREBASE_CONFIG;
    return !!(window.firebase && c && c.apiKey && c.apiKey.indexOf("PASTE") === -1);
  }catch(e){ return false; }
})();

let fb = null;
if (HAS_FIREBASE) {
  try {
    firebase.initializeApp(window.FIREBASE_CONFIG);
    fb = { auth: firebase.auth(), db: firebase.firestore() };
  } catch(e){ /* fall back to local */ }
}

const Store = {
  async loadLocal(){ try{ const v=localStorage.getItem("questhaven:v1"); return v?JSON.parse(v):null; }catch(e){ return null; } },
  async saveLocal(data){ try{ localStorage.setItem("questhaven:v1", JSON.stringify(data)); }catch(e){} },
  async loadCloud(uidStr){ const doc=await fb.db.collection("haven").doc(uidStr).get(); return doc.exists?doc.data().state:null; },
  async saveCloud(uidStr,data){ await fb.db.collection("haven").doc(uidStr).set({ state:data, updated:Date.now() }); },
};

/* ============================================================
   AUTH GATE
   ============================================================ */
function App(){
  const [user, setUser] = useState(undefined); // undefined=checking, null=logged out, obj=in
  const [localMode, setLocalMode] = useState(false);

  useEffect(()=>{
    if (fb) {
      const unsub = fb.auth.onAuthStateChanged(u => setUser(u || null));
      return unsub;
    } else {
      setUser(null); // no firebase → show a light gate, allow local play
    }
  },[]);

  if (user === undefined) return <Centered>Looking for your haven…</Centered>;

  if (!user && !localMode) {
    return <AuthScreen onLocal={()=>setLocalMode(true)} />;
  }

  return <Haven user={user} localMode={localMode}
    onSignOut={()=>{ if(fb){ fb.auth.signOut(); } setLocalMode(false); }} />;
}

function Centered({ children }){
  return <div style={{ fontStyle:"italic", color:"var(--ink-dim)", textAlign:"center", padding:"70px 20px" }}>{children}</div>;
}

function AuthScreen({ onLocal }){
  const [mode, setMode] = useState("in"); // in | up
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [name, setName] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  const submit = async () => {
    setErr(""); setBusy(true);
    try{
      if (!fb) { onLocal(); return; }
      if (mode === "up") {
        const cred = await fb.auth.createUserWithEmailAndPassword(email.trim(), pw);
        if (name.trim()) await cred.user.updateProfile({ displayName: name.trim() });
      } else {
        await fb.auth.signInWithEmailAndPassword(email.trim(), pw);
      }
    }catch(e){ setErr(prettyAuthError(e)); }
    finally{ setBusy(false); }
  };

  return (
    <div style={ST.authWrap}>
      <div style={ST.authCard}>
        <div style={ST.crest}>✦</div>
        <h1 style={ST.authTitle}>Quest Haven</h1>
        <p style={ST.authSub}>a little world that grows with what you finish</p>

        {!fb && (
          <div style={ST.localNote}>
            Cloud login isn’t set up yet, so you can begin in <b>local mode</b> (saves to this device).
            Add Firebase keys later to sync across devices.
          </div>
        )}

        {fb && (
          <>
            <div style={ST.segRow}>
              <button onClick={()=>setMode("in")} style={{...ST.seg, ...(mode==="in"?ST.segOn:{})}}>Sign in</button>
              <button onClick={()=>setMode("up")} style={{...ST.seg, ...(mode==="up"?ST.segOn:{})}}>Create account</button>
            </div>
            {mode==="up" && (
              <input style={ST.input} placeholder="Your name (optional)" value={name}
                onChange={e=>setName(e.target.value)} />
            )}
            <input style={ST.input} placeholder="Email" type="email" autoCapitalize="none"
              value={email} onChange={e=>setEmail(e.target.value)} />
            <input style={ST.input} placeholder="Password" type="password"
              value={pw} onChange={e=>setPw(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") submit(); }} />
            {err && <div style={ST.authErr}>{err}</div>}
          </>
        )}

        <button onClick={submit} disabled={busy} style={ST.authBtn}>
          {busy ? "…" : fb ? (mode==="up" ? "Begin your haven" : "Enter") : "Start in local mode"}
        </button>

        {fb && (
          <button onClick={onLocal} style={ST.linkBtn}>or play locally without an account</button>
        )}
      </div>
    </div>
  );
}

function prettyAuthError(e){
  const c = (e && e.code) || "";
  if (c.includes("email-already-in-use")) return "That email already has an account — try signing in.";
  if (c.includes("invalid-email")) return "That doesn’t look like a valid email.";
  if (c.includes("weak-password")) return "Password should be at least 6 characters.";
  if (c.includes("wrong-password") || c.includes("invalid-credential")) return "Wrong email or password.";
  if (c.includes("user-not-found")) return "No account with that email — create one first.";
  if (c.includes("too-many-requests")) return "Too many tries — wait a moment and retry.";
  return (e && e.message) ? e.message : "Could not sign in.";
}

/* ============================================================
   HAVEN — the main app once logged in
   ============================================================ */
function Haven({ user, localMode, onSignOut }){
  const [state, setState] = useState(blankState());
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("haven"); // haven | add | quests
  const [draftText, setDraftText] = useState("");
  const [draftSection, setDraftSection] = useState("reading");
  const [drawn, setDrawn] = useState(null);     // task id currently drawn
  const [rolling, setRolling] = useState(false); // gatcha animation
  const [flash, setFlash] = useState(null);
  const [reward, setReward] = useState(null);
  const [rewardInput, setRewardInput] = useState("");
  const [inside, setInside] = useState(false);
  const saveTimer = useRef(null);

  const cloudId = (fb && user) ? user.uid : null;

  // ---- load ----
  useEffect(()=>{
    (async ()=>{
      let data = null;
      try{
        if (cloudId) data = await Store.loadCloud(cloudId);
        if (!data) data = await Store.loadLocal();
      }catch(e){}
      if (data) setState({ ...blankState(), ...data });
      setLoaded(true);
    })();
  },[]);

  // ---- save (debounced, to cloud + local) ----
  useEffect(()=>{
    if(!loaded) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async ()=>{
      Store.saveLocal(state);
      if (cloudId){ try{ await Store.saveCloud(cloudId, state); }catch(e){} }
    }, 400);
  },[state, loaded]);

  const n = state.shuffle.length;
  const drawnTask = drawn ? state.tasks.find(t=>t.id===drawn) : null;

  const addTask = ()=>{
    const text = draftText.trim(); if(!text) return;
    setState(s=>{
      const task={ id:uid(), text, section:draftSection };
      return { ...s, tasks:[...s.tasks,task], shuffle:shuffleArray([...s.shuffle,task.id]) };
    });
    setDraftText("");
  };

  // CLICK-TO-DRAW: pick a random remaining quest, with a roll animation
  const rollGatcha = ()=>{
    if (n===0 || rolling) return;
    setDrawn(null); setReward(null);
    setRolling(true);
    setState(s=>({ ...s, shuffle: shuffleArray(s.shuffle) })); // reshuffle hidden order
    setTimeout(()=>{
      setState(s=>{
        const idx = Math.floor(Math.random()*s.shuffle.length);
        setDrawn(s.shuffle[idx]);
        return s;
      });
      setRolling(false);
    }, 1100);
  };

  const reshuffle = ()=>{ setDrawn(null); rollGatcha(); };

  const completeDrawn = ()=>{
    if(!drawnTask) return;
    const sec=drawnTask.section;
    if(sec==="reading"||sec==="business"){ setReward({section:sec}); return; }
    applyCompletion(drawnTask,{});
  };

  const applyCompletion = (task, extra)=>{
    setState(s=>{
      const tasks=s.tasks.filter(t=>t.id!==task.id);
      const shuffle=shuffleArray(s.shuffle.filter(id=>id!==task.id));
      const ns={ ...s, tasks, shuffle, history:[task.text, ...s.history].slice(0,30) };
      switch(task.section){
        case "reading": ns.books=[...s.books,{title:extra.title||task.text}]; break;
        case "business": ns.coins=s.coins+(extra.amount||10); break;
        case "relationships": ns.plants=s.plants+1; break;
        case "fitness": ns.xp=s.xp+100; break;
        case "environment": ns.lights=s.lights+1; break;
        case "spirituality": ns.lotuses=s.lotuses+1; break;
      }
      return ns;
    });
    setDrawn(null); setReward(null); setRewardInput("");
    setFlash({section:task.section}); setTimeout(()=>setFlash(null),1900);
  };

  const confirmReward = ()=>{
    if(!reward||!drawnTask) return;
    if(reward.section==="reading") applyCompletion(drawnTask,{title:rewardInput.trim()||drawnTask.text});
    else if(reward.section==="business") applyCompletion(drawnTask,{amount:Math.max(1,parseInt(rewardInput,10)||10)});
  };

  const medals = Math.floor(state.xp/1000);
  const who = (user && (user.displayName || user.email)) || (localMode ? "wanderer" : "you");

  if(!loaded) return <Centered>Unrolling the garden…</Centered>;

  return (
    <div style={ST.shell}>
      <header style={ST.header}>
        <div>
          <div style={ST.title}>Quest Haven</div>
          <div style={ST.sub}>{inside ? "by the hearth — tap the door to step out" : `welcome back, ${who}`}</div>
        </div>
        <button onClick={onSignOut} style={ST.signOut}>{fb&&user ? "Sign out" : "Exit"}</button>
      </header>

      <div style={ST.stage}>
        {inside
          ? <Interior state={state} medals={medals} flash={flash} onExit={()=>setInside(false)} />
          : <Exterior state={state} medals={medals} flash={flash}
              rolling={rolling} drawnTask={drawnTask} onRoll={rollGatcha}
              onEnter={()=>setInside(true)} n={n} />}
      </div>

      <div style={ST.stats}>
        <Stat c="#c98a4a" label="Books" v={state.books.length} />
        <Stat c="#5a9e6a" label="Coins" v={state.coins} />
        <Stat c="#d4658a" label="Garden" v={state.plants} />
        <Stat c="#e0a93f" label="XP" v={state.xp} sub={`${medals}🏅`} />
        <Stat c="#5aa0c0" label="Lanterns" v={state.lights} />
        <Stat c="#a06fd0" label="Lotus" v={state.lotuses} />
      </div>

      <nav style={ST.tabs}>
        {[["haven","Haven"],["add","Add Quest"],["quests",`Gatcha (${n})`]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{...ST.tab, ...(tab===k?ST.tabOn:{})}}>{l}</button>
        ))}
      </nav>

      <main style={ST.panel}>
        {tab==="haven" && <HavenTab state={state} medals={medals} />}
        {tab==="add" && (
          <AddTab draftText={draftText} setDraftText={setDraftText}
            draftSection={draftSection} setDraftSection={setDraftSection}
            addTask={addTask} tasks={state.tasks} />
        )}
        {tab==="quests" && (
          <GatchaPanel n={n} rolling={rolling} drawnTask={drawnTask}
            onRoll={rollGatcha} reshuffle={reshuffle} completeDrawn={completeDrawn}
            reward={reward} rewardInput={rewardInput} setRewardInput={setRewardInput}
            confirmReward={confirmReward} cancelReward={()=>{setReward(null);setRewardInput("");}} />
        )}
      </main>

      <footer style={ST.footer}>
        {cloudId ? "Synced to your account across devices." : "Saved on this device. Add Firebase keys to sync."}
      </footer>
    </div>
  );
}

/* ---------------- panels ---------------- */
function Stat({ c, label, v, sub }){
  return (
    <div style={ST.stat}>
      <span style={{...ST.statDot, background:c}} />
      <span><b style={ST.statV}>{v}</b>{sub && <span style={ST.statSub}> {sub}</span>}
        <span style={ST.statL}>{label}</span></span>
    </div>
  );
}

function AddTab({ draftText, setDraftText, draftSection, setDraftSection, addTask, tasks }){
  return (
    <div>
      <p style={ST.lead}>Cast a quest into the haven. Its realm decides what it grows.</p>
      <div style={ST.chipRow}>
        {SECTION_KEYS.map(k=>(
          <button key={k} onClick={()=>setDraftSection(k)}
            style={{...ST.chip, borderColor:SECTIONS[k].color,
              background:draftSection===k?SECTIONS[k].color:"transparent",
              color:draftSection===k?"#fff":SECTIONS[k].color}}>
            {SECTIONS[k].label}
          </button>
        ))}
      </div>
      <p style={ST.hint}>Completing → {SECTIONS[draftSection].reward}.</p>
      <textarea value={draftText} onChange={e=>setDraftText(e.target.value)}
        placeholder="e.g. Walk for 30 minutes at dawn"
        style={ST.textarea}
        onKeyDown={e=>{ if(e.key==="Enter"&&(e.metaKey||e.ctrlKey)) addTask(); }} />
      <button onClick={addTask} disabled={!draftText.trim()} style={ST.primary}>Cast the quest</button>
      {tasks.length>0 && (
        <div style={ST.pending}>
          <div style={ST.pendingHead}>{tasks.length} quest{tasks.length>1?"s":""} await the gatcha</div>
          {SECTION_KEYS.map(k=>{
            const c=tasks.filter(t=>t.section===k).length; if(!c) return null;
            return <span key={k} style={{...ST.pendChip,color:SECTIONS[k].color,borderColor:SECTIONS[k].color}}>{SECTIONS[k].label}: {c}</span>;
          })}
        </div>
      )}
    </div>
  );
}

function GatchaPanel({ n, rolling, drawnTask, onRoll, reshuffle, completeDrawn, reward, rewardInput, setRewardInput, confirmReward, cancelReward }){
  if (n===0 && !drawnTask) {
    return <div style={ST.empty}>The gatcha sits quiet. Add a few quests, then give it a turn.</div>;
  }
  if (reward) {
    const sec=reward.section;
    return (
      <div style={ST.rewardCard}>
        <div style={ST.rewardTitle}>Quest fulfilled!</div>
        {sec==="reading" && <>
          <p style={ST.lead}>Add a book to your shelf. What did you read?</p>
          <input style={ST.input} value={rewardInput} autoFocus placeholder="Book title"
            onChange={e=>setRewardInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")confirmReward();}} />
        </>}
        {sec==="business" && <>
          <p style={ST.lead}>Drop coins in the vault. How much did you earn or save?</p>
          <input style={ST.input} type="number" min="1" value={rewardInput} autoFocus placeholder="Coins"
            onChange={e=>setRewardInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")confirmReward();}} />
        </>}
        <div style={ST.row}>
          <button onClick={confirmReward} style={ST.primary}>Place it</button>
          <button onClick={cancelReward} style={ST.ghost}>Back</button>
        </div>
      </div>
    );
  }
  if (drawnTask) {
    const sec=SECTIONS[drawnTask.section];
    return (
      <div style={ST.drawCard}>
        <div style={{...ST.drawTag,color:sec.color,borderColor:sec.color}}>{sec.label}</div>
        <div style={ST.drawText}>{drawnTask.text}</div>
        <p style={ST.hint}>Fulfil this and you earn {sec.reward}.</p>
        <div style={ST.row}>
          <button onClick={completeDrawn} style={ST.primary}>I did it ✓</button>
          <button onClick={reshuffle} style={ST.ghost}>↻ Spin again</button>
        </div>
      </div>
    );
  }
  return (
    <div style={{textAlign:"center"}}>
      <p style={ST.lead}>{rolling ? "The gatcha is turning…" : `${n} quest${n>1?"s":""} hidden inside. Give it a spin.`}</p>
      <button onClick={onRoll} disabled={rolling} style={ST.bigSpin}>{rolling ? "✦ spinning ✦" : "Spin the Gatcha"}</button>
      <p style={ST.hint}>You can also tap the gatcha machine in the haven scene above.</p>
    </div>
  );
}

function HavenTab({ state, medals }){
  return (
    <div>
      <p style={ST.lead}>Your haven so far. Every quest leaves a lasting mark.</p>
      <div style={ST.detailGrid}>
        <Detail title="Bookshelf" color="#c98a4a">
          {state.books.length===0 ? <em style={ST.dim}>No books yet.</em> :
            state.books.slice(-6).reverse().map((b,i)=><div key={i} style={ST.li}>📖 {b.title}</div>)}
        </Detail>
        <Detail title="Vault" color="#5a9e6a">
          <div style={ST.big}>{state.coins} <span style={ST.dim}>coins</span></div>
        </Detail>
        <Detail title="Garden" color="#d4658a">
          <div style={ST.big}>{state.plants} <span style={ST.dim}>blooms</span></div>
          <div>{Array.from({length:Math.min(state.plants,14)}).map((_,i)=><span key={i}>{["🌷","🌻","🌸","🌹","🌼","🪻","🏵️"][i%7]}</span>)}</div>
        </Detail>
        <Detail title="Trophies" color="#e0a93f">
          <div style={ST.big}>{medals} <span style={ST.dim}>medal{medals!==1?"s":""}</span></div>
          <em style={ST.dim}>{state.xp} XP · {1000-(state.xp%1000)} to next</em>
        </Detail>
        <Detail title="Lanterns" color="#5aa0c0">
          <div style={ST.big}>{state.lights} <span style={ST.dim}>lit</span></div>
        </Detail>
        <Detail title="Stream Lotuses" color="#a06fd0">
          <div style={ST.big}>{state.lotuses} <span style={ST.dim}>open</span></div>
          <div>{Array.from({length:Math.min(state.lotuses,12)}).map((_,i)=><span key={i}>🪷</span>)}</div>
        </Detail>
        <Detail title="Recent" color="#9a8a72">
          {state.history.length===0 ? <em style={ST.dim}>Nothing yet.</em> :
            state.history.slice(0,6).map((h,i)=><div key={i} style={ST.li}>✓ {h}</div>)}
        </Detail>
      </div>
    </div>
  );
}
function Detail({ title, color, children }){
  return <div style={{...ST.detail, borderColor:color}}>
    <div style={{...ST.detailTitle, color}}>{title}</div>{children}</div>;
}

/* ============================================================
   SCENE HELPERS — painterly fantasy flora
   ============================================================ */
function Flower({ x, y, scale=1, kind=0, i=0 }){
  const K=[
    {petal:"#f0567e",center:"#ffd45e"},{petal:"#f7a83a",center:"#a8632a"},
    {petal:"#a86fd0",center:"#ffe38a"},{petal:"#ff8fb0",center:"#ffd45e"},
    {petal:"#5aa0e0",center:"#ffe38a"},{petal:"#ef5a4a",center:"#ffe38a"},
    {petal:"#ffffff",center:"#ffd45e"},{petal:"#f4c95d",center:"#c98a2a"},
  ];
  const c=K[kind%K.length], dur=4+(i%4);
  return (
    <g transform={`translate(${x},${y}) scale(${scale})`}>
      <animateTransform attributeName="transform" type="rotate" additive="sum"
        values="-2 0 6; 2 0 6; -2 0 6" dur={`${dur}s`} repeatCount="indefinite" />
      <path d="M0,6 Q-0.6,2 0,-1" stroke="#4e7a3a" strokeWidth="0.9" fill="none" />
      <ellipse cx="-1.6" cy="3" rx="1.6" ry="0.7" fill="#6aae4e" transform="rotate(-25 -1.6 3)" />
      <ellipse cx="1.6" cy="4.2" rx="1.6" ry="0.7" fill="#6aae4e" transform="rotate(25 1.6 4.2)" />
      {[0,60,120,180,240,300].map(a=>(
        <ellipse key={a} cx="0" cy="-2.5" rx="1.2" ry="2" fill={c.petal} transform={`rotate(${a} 0 -1)`} />
      ))}
      <circle cx="0" cy="-1" r="1.2" fill={c.center} />
    </g>
  );
}
function Tree({ x, y, s=1, tint }){
  // tall conifer (pine), tinted by time of day
  const dark = tint?.tree || "#2f5a38";
  const mid  = tint?.tree2 || "#3d7048";
  const lite = tint?.tree3 || "#4f8a56";
  return (
    <g transform={`translate(${x},${y}) scale(${s})`}>
      <rect x="-1.5" y="2" width="3" height="10" fill="#4a3424" />
      <path d="M0,-26 L7,-8 L-7,-8 Z" fill={dark} />
      <path d="M0,-20 L9,-2 L-9,-2 Z" fill={mid} />
      <path d="M0,-13 L11,5 L-11,5 Z" fill={lite} />
      <path d="M0,-26 L4,-14 L-4,-14 Z" fill={mid} opacity="0.6" />
    </g>
  );
}

function Lotus({ x, y, scale=1, i=0 }){
  return (
    <g transform={`translate(${x},${y}) scale(${scale})`}>
      <ellipse cx="0" cy="1.4" rx="5.5" ry="1.8" fill="#2f6a4a" opacity="0.8" />
      <ellipse cx="-2.5" cy="1.2" rx="2.4" ry="0.9" fill="#3a7a54" />
      {/* petals */}
      {[-40,-15,15,40].map((a,k)=>(
        <ellipse key={k} cx="0" cy="-1.4" rx="1.1" ry="2.4" fill="#ff9ec2" transform={`rotate(${a} 0 0.6)`} />
      ))}
      <ellipse cx="0" cy="-1.6" rx="1.1" ry="2.6" fill="#ffd0e0" />
      <circle cx="0" cy="-0.4" r="0.9" fill="#ffe38a" />
      <animateTransform attributeName="transform" type="translate" additive="sum"
        values="0 0; 0.6 0.3; 0 0; -0.6 0.2; 0 0" dur={`${7+i%4}s`} repeatCount="indefinite" />
    </g>
  );
}

/* time-of-day palette: returns colors for the current hour */
function skyPalette(){
  const h = new Date().getHours();
  // dawn 5-8, day 8-17, dusk 17-20, night else
  if (h>=5 && h<8)  return { phase:"dawn",
    sky:["#f7c9a8","#fbe0c0","#e6e0c0"], horizon:"#ffd9a0", orb:"#fff0d0", orbY:60, star:0,
    tree:"#3a5a44", tree2:"#4a7050", tree3:"#5c8a5e", glow:0.5, win:0.55, water:"#7a9aa0", grass:"#7aa860" };
  if (h>=8 && h<17) return { phase:"day",
    sky:["#8fcfe8","#bfe6e0","#f4ecc6"], horizon:"#dff0d8", orb:"#fff8e0", orbY:26, star:0,
    tree:"#2f5a38", tree2:"#3d7048", tree3:"#4f8a56", glow:0.25, win:0.4, water:"#5aa0b8", grass:"#5f9a3f" };
  if (h>=17 && h<20) return { phase:"dusk",
    sky:["#c98aa8","#e6a890","#f4c178"], horizon:"#ffb060", orb:"#ffd9a0", orbY:74, star:0,
    tree:"#2a4836",tree2:"#365c42",tree3:"#46704e", glow:0.7, win:0.85, water:"#3a5a68", grass:"#4a7048" };
  return { phase:"night",
    sky:["#1e2a4a","#2e3a5e","#4a3a5a"], horizon:"#5a4a6a", orb:"#eef2ff", orbY:30, star:1,
    tree:"#1e3326",tree2:"#26402e",tree3:"#2f5038", glow:0.85, win:1, water:"#1e3344", grass:"#2e5238" };
}

   INTERIOR — warm vivid cottage room
   ============================================================ */
function Medal({ x, y, s=1 }){
  return (
    <g transform={`translate(${x},${y}) scale(${s})`}>
      <path d="M-2,-6 L-0.6,-1 L0,-2 L0.6,-1 L2,-6 Z" fill="#5b8ec9" />
      <circle cx="0" cy="1.6" r="2.8" fill="#f4c95d" stroke="#c98a2a" strokeWidth="0.5" />
      <circle cx="-0.8" cy="0.8" r="0.7" fill="#fffbe8" opacity="0.8" />
      <path d="M0,0.3 l0.5,1 l1.1,0.1 l-0.8,0.7 l0.3,1 l-1.1,-0.6 l-1.1,0.6 l0.3,-1 l-0.8,-0.7 l1.1,-0.1 z" fill="#c98a2a" />
    </g>
  );
}
function Interior({ state, medals, flash, onExit }){
  const litWall=Math.min(state.lights,8), books=Math.min(state.books.length,12), trophies=Math.min(medals,5);
  return (
    <svg viewBox="0 0 200 160" style={{ width:"100%", height:"auto", display:"block" }}>
      <defs>
        <radialGradient id="ii-glow" cx="50%" cy="35%" r="60%"><stop offset="0%" stopColor={`rgba(255,220,140,${0.2+litWall*0.06})`} /><stop offset="100%" stopColor="rgba(255,220,140,0)" /></radialGradient>
        <radialGradient id="ii-fire" cx="50%" cy="60%" r="60%"><stop offset="0%" stopColor="#ffd76a" /><stop offset="60%" stopColor="#f7913a" /><stop offset="100%" stopColor="#d2542a" /></radialGradient>
      </defs>
      <rect x="0" y="0" width="200" height="116" fill="#e8c9a0" />
      {[16,40,64,88].map(y=><line key={y} x1="0" y1={y} x2="200" y2={y} stroke="#d8b888" strokeWidth="0.6" />)}
      <rect x="0" y="104" width="200" height="12" fill="#caa470" />
      <rect x="0" y="116" width="200" height="44" fill="#b07f4a" />
      {[28,60,92,124,156,188].map((x,i)=><line key={i} x1={x} y1="116" x2={x+(i-2.5)*6} y2="160" stroke="#9a6838" strokeWidth="0.8" opacity="0.5" />)}
      <ellipse cx="100" cy="70" rx="120" ry="74" fill="url(#ii-glow)" />

      {/* window with stream/garden view */}
      <rect x="78" y="20" width="44" height="40" rx="3" fill="#9a6a40" />
      <rect x="81" y="23" width="38" height="22" fill="#a98ab8" />{/* dusky sky */}
      <rect x="81" y="40" width="38" height="17" fill="#5f8a4a" />
      <path d="M88,40 q4,8 -2,17" stroke="#3a5a68" strokeWidth="3" fill="none" opacity="0.8" />{/* stream */}
      <circle cx="108" cy="30" r="4" fill="#ffe0b0" />
      {state.plants>0 && <Flower x={104} y={52} scale={0.7} kind={0} />}
      {state.lotuses>0 && <Lotus x={87} y={50} scale={0.7} i={0} />}
      <line x1="100" y1="23" x2="100" y2="57" stroke="#9a6a40" strokeWidth="1.5" />
      <line x1="81" y1="40" x2="119" y2="40" stroke="#9a6a40" strokeWidth="1.5" />
      <rect x="75" y="57" width="50" height="4" rx="2" fill="#b07f4a" />

      {/* lotus bowl on the mantel (spirituality nod) */}
      {state.lotuses>0 && <Lotus x={108} y={80} scale={0.9} i={1} />}

      {/* fairy lights */}
      <path d="M6,8 Q60,16 100,8 T194,10" stroke="#7a5a3a" strokeWidth="0.6" fill="none" />
      {[...Array(6)].map((_,i)=>{
        const on=i<litWall, xs=[18,46,74,116,150,180], ys=[11,14,10,10,13,11], lc=["#ff6a8a","#ffd45e","#6fe0a0","#4ac0e0","#c79bff","#ff9ec2"][i];
        return <g key={i}><circle cx={xs[i]} cy={ys[i]} r="1.6" fill={on?lc:"#cbb894"}>
          {on && <animate attributeName="opacity" values="1;0.5;1" dur={`${1.6+i*0.3}s`} repeatCount="indefinite" />}</circle>
          {on && <circle cx={xs[i]} cy={ys[i]} r="3.4" fill={lc} opacity="0.2" />}</g>;
      })}

      {/* trophy shelf */}
      <g>
        <rect x="12" y="58" width="50" height="5" rx="1.5" fill="#9a6a40" />
        <path d="M18,63 l3,6 M56,63 l-3,6" stroke="#7a4e2c" strokeWidth="1.4" />
        <rect x="20" y="28" width="34" height="6" rx="2" fill="#a4703f" />
        <text x="37" y="32.4" fontSize="3" fill="#fff3d0" textAnchor="middle" fontStyle="italic">Trophies</text>
        {trophies>0 ? [...Array(trophies)].map((_,i)=><Medal key={i} x={20+i*11} y={50} s={1.15} />)
          : <text x="37" y="50" fontSize="3.2" fill="#a8895f" textAnchor="middle" fontStyle="italic">earn 1000 XP…</text>}
      </g>

      {/* bookshelf */}
      <g>
        <rect x="138" y="40" width="52" height="44" rx="2" fill="#7a4e2c" />
        <rect x="140" y="42" width="48" height="40" rx="1.5" fill="#5a3a22" />
        {[55,69].map(yy=><rect key={yy} x={140} y={yy} width="48" height="2.5" fill="#7a4e2c" />)}
        {[...Array(books)].map((_,i)=>{
          const row=Math.floor(i/4), idx=i%4, cols=["#e0b84a","#d98c6a","#9ec47b","#7baee0","#c79bff","#ef8a6a","#e08aa8","#6fc04a","#4a8fe0","#ffd45e","#ff9ec2","#5fb04a"];
          return <rect key={i} x={143+idx*11} y={row?59:45} width="8" height="10" rx="0.6" fill={cols[i%cols.length]} />;
        })}
        {books===0 && <text x="164" y="64" fontSize="3.2" fill="#a8895f" textAnchor="middle" fontStyle="italic">a quiet shelf</text>}
      </g>

      {/* hearth */}
      <g>
        <rect x="86" y="84" width="28" height="32" rx="2" fill="#b9a890" />
        <path d="M93,116 L93,102 Q100,96 107,102 L107,116 Z" fill="#2a1810" />
        <rect x="95" y="112" width="10" height="2.4" rx="1" fill="#7a4e2c" />
        <path d="M100,113 Q96,107 99,103 Q100,107 102,104 Q104,108 100,113 Z" fill="url(#ii-fire)"><animate attributeName="opacity" values="1;0.75;1" dur="1.2s" repeatCount="indefinite" /></path>
        <circle cx="100" cy="106" r="1.4" fill="#ffe9a0" opacity="0.9"><animate attributeName="r" values="1.4;1.9;1.4" dur="1.4s" repeatCount="indefinite" /></circle>
        <rect x="83" y="82" width="34" height="3" rx="1.5" fill="#9a6a40" />
        <ellipse cx="100" cy="120" rx="26" ry="7" fill="#ffb74a" opacity="0.25" />
      </g>

      {/* gatcha indoors (decor) */}
      <g transform="translate(120,92)">
        <ellipse cx="9" cy="30" rx="11" ry="3" fill="#000" opacity="0.12" />
        <rect x="2" y="20" width="14" height="10" rx="2" fill="#d2547a" />
        <circle cx="9" cy="8" r="8" fill="#ff8fae" /><circle cx="6" cy="8" r="1.6" fill="#ffd45e" /><circle cx="11" cy="6" r="1.6" fill="#6fe0a0" /><circle cx="10" cy="10" r="1.6" fill="#7fb8e6" />
        <rect x="6" y="22" width="6" height="3" rx="1" fill="#7a2942" />
      </g>

      {/* vault (piggy) */}
      <g transform="translate(54,98)">
        <ellipse cx="11" cy="20" rx="13" ry="3" fill="#000" opacity="0.12" />
        <ellipse cx="11" cy="12" rx="13" ry="9" fill="#f4a0c0" />
        <path d="M21,8 l4,-2 l-0.6,4.6 z" fill="#f4a0c0" /><circle cx="6" cy="10" r="1" fill="#7a2942" />
        <rect x="8" y="3" width="6" height="1.6" rx="0.8" fill="#d2547a" />
        {state.coins>0 && <text x="11" y="29" fontSize="3" fill="#a0703f" textAnchor="middle" fontStyle="italic">{state.coins} saved</text>}
      </g>

      {/* rug */}
      <g>
        <ellipse cx="100" cy="140" rx="46" ry="13" fill="#c06a7a" opacity="0.85" />
        <ellipse cx="100" cy="140" rx="32" ry="9" fill="#dd8a90" opacity="0.8" />
        <ellipse cx="100" cy="140" rx="18" ry="5" fill="#f0b39a" opacity="0.8" />
      </g>

      {/* exit door */}
      <g onClick={onExit} style={{ cursor:"pointer" }}>
        <path d="M8,116 L8,74 Q22,62 36,74 L36,116 Z" fill="#8a5a32" />
        <path d="M10,116 L10,75 Q22,64 34,75 L34,116 Z" fill="#a06f40" />
        <path d="M15,76 Q22,70 29,76 L29,82 L15,82 Z" fill="#cfe8e0" opacity="0.85" />
        <circle cx="31" cy="96" r="1.3" fill="#ffd45e" />
        <path className="qr-door-hint" d="M6,117 L6,73 Q22,60 38,73 L38,117" fill="none" stroke="#ffd45e" strokeWidth="1" opacity="0" />
        <rect className="qr-door-label-bg" x="11" y="54" width="22" height="6" rx="3" fill="#3a2418" opacity="0" />
        <text className="qr-door-label" x="22" y="58.3" fontSize="3.4" fill="#fff3d0" textAnchor="middle" opacity="0">outside</text>
      </g>

      {flash && (
        <text x="100" y="40" fontSize="9" textAnchor="middle" fontStyle="italic"
          fill={SECTIONS[flash.section].color} style={{ paintOrder:"stroke", stroke:"#fffdf6", strokeWidth:1.4 }}>
          + {SECTIONS[flash.section].label}!
          <animate attributeName="y" values="40;26" dur="1.8s" /><animate attributeName="opacity" values="1;1;0" dur="1.8s" />
        </text>
      )}
    </svg>
  );
}
