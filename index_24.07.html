  <script type="text/plain" id="app-code">
const { useState, useEffect, useRef } = React;

/* Error boundary — catches React render errors and shows them on screen */
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={err:null}; }
  static getDerivedStateFromError(e){ return {err:e}; }
  render(){
    if(this.state.err){
      return <div style={{fontFamily:"Georgia,serif",color:"#8a4a3a",padding:"30px 20px",lineHeight:1.6}}>
        <div style={{fontSize:18,fontStyle:"italic",marginBottom:10}}>Something went wrong</div>
        <div style={{fontSize:12,background:"#f5ede8",padding:12,borderRadius:8,wordBreak:"break-all"}}>
          {this.state.err.message||String(this.state.err)}
        </div>
        <div style={{fontSize:12,color:"#9a866f",marginTop:12}}>Open browser console (F12) for more detail. Screenshot this and send it.</div>
      </div>;
    }
    return this.props.children;
  }
}

/* ============================================================
   QUEST HAVEN  —  Phase 1: data model + reward engine
   Per-category XP. Every 500 XP = one unlock stage.
   ============================================================ */

const SECTIONS = {
  reading:      { label:"Reading",       xp:50,  color:"#c98a4a", reward:"a titled book on your shelf" },
  business:     { label:"Business",      xp:150, color:"#d4a93f", reward:"₹10,000 in your bank" },
  relationships:{ label:"Relationships", xp:100, color:"#d4658a", reward:"flowers in the garden" },
  fitness:      { label:"Fitness",       xp:150, color:"#5a9e6a", reward:"vegetables in the greenhouse" },
  environment:  { label:"Environment",   xp:75,  color:"#5aa0c0", reward:"bees in the garden, stars in the sky" },
  spirituality: { label:"Spirituality",  xp:75,  color:"#a06fd0", reward:"lotuses on the stream" },
  skills:       { label:"Skills",        xp:150, color:"#e0a93f", reward:"150 LinkedIn connections" },
  creativity:   { label:"Creativity",    xp:100, color:"#e07a5a", reward:"1,500 Instagram followers" },
  innerChild:   { label:"Inner Child",   xp:75,  color:"#7ab8a0", reward:"a memory in the mysterious book" },
};
const SECTION_KEYS = Object.keys(SECTIONS);
// Row order for the Haven grid (2-per-row) and the Log tab — distinct from SECTION_KEYS'
// natural/insertion order used elsewhere (Add tab chips, etc.)
const HAVEN_DISPLAY_ORDER = ["business","creativity","skills","fitness","relationships","innerChild","environment","spirituality","reading"];
const UNLOCK_STEP = 1000; // standard XP ladder for all non-workspace, non-reading categories

const STORE_KEY = "questhaven:v1";

const blankState = () => ({
  tasks: [],        // {id, text, section}
  shuffle: [],      // hidden gatcha order: task ids
  xp: {             // per-category accumulated XP
    reading:0, business:0, relationships:0, fitness:0,
    environment:0, spirituality:0, skills:0, creativity:0, innerChild:0
  },
  books: [],        // {title, quote} — Reading unlocks
  coins: 0,         // legacy (kept for migration safety)
  history: [],      // recent completed task texts
  // ── Workspace fields ──────────────────────────────────────────
  instagramHandle: "",      // e.g. "@maya" — set at signup
  linkedinName: "",         // display name for LinkedIn — set at signup
  linkedinSkills: [],       // [{skill}] — one per 3000 connections milestone
  cheques: [],              // [{payee, amount, date}] — cheque book transactions
  workspaceView: "desktop", // "desktop"|"instagram"|"linkedin"|"bank" — active laptop screen
  // ── Reading nook milestone rewards ───────────────────────────
  travelList: [],    // {id, text, done} — globe milestone (7+ books), freeform checklist
  oracleNames: [],   // up to 6 strings — teacup milestone (13+ books), "What would they do?"
  wishes: [],        // up to 3 strings — maneki neko milestone (19+ books)
  // ── Secret portal (witch room) — Inner Child rewards ─────────
  dreamBook: [],     // up to 15 strings — mysterious book, 1 entry per 1000 Inner Child XP
  // ── Productivity upgrades ────────────────────────────────────
  streak: { count:0, best:0, lastDay:null }, // daily completion streak
  focusDay: null,    // date the focusIds belong to (resets daily)
  focusIds: [],      // up to 3 task ids starred as today's focus (x1.5 XP)
  futureLetters: [], // time capsule — [{id, text, openOn, created, opened}]
});

let _id = 0;
const uid = () => `t${Date.now()}_${_id++}`;
function shuffleArray(a){ const r=[...a]; for(let i=r.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; } return r; }

/* ---- productivity helpers (streaks / focus / recurring / rarity) ---- */
const todayStr = () => { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const yesterdayStr = () => { const d=new Date(); d.setDate(d.getDate()-1); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const weekKeyStr = () => { const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-((d.getDay()+6)%7)); return "w"+d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate(); };
/* recurring quests rest after completion until their next period */
const taskAvailable = (t) => !t.recur || !t.lastDone || (t.recur==="daily" ? t.lastDone.day!==todayStr() : t.lastDone.week!==weekKeyStr());
const dueStatus = (t) => { if(!t.due) return null; const td=todayStr(); return t.due<td ? "overdue" : t.due===td ? "today" : "later"; };
const streakMult = (streak) => 1 + Math.min((streak&&streak.count)||0,10)*0.02; // +2%/day, capped at +20%
const streakShown = (streak) => (streak && (streak.lastDay===todayStr()||streak.lastDay===yesterdayStr())) ? (streak.count||0) : 0;
/* gatcha rarity — every draw gets a blessing multiplier, claimed if completed while drawn */
const RARITIES = [
  { k:"common",    label:"Common",    p:0.55, mult:1.1,  color:"#8a97a5" },
  { k:"rare",      label:"Rare",      p:0.28, mult:1.25, color:"#4a90c2" },
  { k:"epic",      label:"Epic",      p:0.13, mult:1.5,  color:"#a06fd0" },
  { k:"legendary", label:"Legendary", p:0.04, mult:2,    color:"#e0a93f" },
];
function rollRarity(){ let r=Math.random(); for(const t of RARITIES){ if(r<t.p) return t; r-=t.p; } return RARITIES[0]; }

/* ---- unlock helpers ---- */
const stagesFor = (xpVal) => Math.floor((xpVal||0) / UNLOCK_STEP);          // how many 1000-XP steps reached
const stepsOf1000 = (xpVal) => Math.floor((xpVal||0) / 1000);               // same 1000-XP pacing, used directly by Reward engine
const xpInto = (xpVal) => (xpVal||0) % UNLOCK_STEP;                          // progress toward next step
const pctInto = (xpVal) => Math.round(xpInto(xpVal) / UNLOCK_STEP * 100);
/* Reading-specific pacing: 1 book per 1000 XP (same rate as the standard ladder, tracked separately
   because reading unlocks discrete book objects rather than a generic "stage") */
const READING_UNLOCK_STEP = 1000;
const readingXpInto = (xpVal) => (xpVal||0) % READING_UNLOCK_STEP;
const readingPctInto = (xpVal) => Math.round(readingXpInto(xpVal) / READING_UNLOCK_STEP * 100);

/* ---- Workspace-category progress (business / skills / creativity) ----
   These categories don't use the 1000-XP ladder at all: every single task instantly grants
   its reward (₹10,000 / 150 connections / 1,500 followers), so an XP-based bar is meaningless.
   What genuinely spans multiple tasks is each category's next tangible unlock:
     business:   next ticket at ₹2,50,000 earned  → 250000/10000 = 25 tasks
     skills:     next skill entry at 3,000 conn.   → 3000/150     = 20 tasks
     creativity: next DM at 15,000 followers       → 15000/1500  = 10 tasks
   The bar below shows tasks-into-current-cycle / tasks-per-reward, and the "big number"
   shows total rewards earned so far (tickets / skill entries / DMs) instead of a mismatched
   XP-stage count. */
const WORKSPACE_KEYS = ["business","skills","creativity"];
const WORKSPACE_TASKS_PER_REWARD = { business:25, skills:20, creativity:10 };
const isWorkspaceKey = (k) => WORKSPACE_KEYS.includes(k);
// XP needed for one reward cycle, in default-task terms (tasks-per-reward × that section's base XP).
// Progress is tracked in raw XP (not task count) so it stays accurate even when a task's XP was
// customised away from the section default via the Add-tab slider.
const workspaceXpPerReward = (k) => SECTIONS[k].xp * WORKSPACE_TASKS_PER_REWARD[k];
const workspaceRewardsEarned = (k, xpVal) => Math.floor((xpVal||0) / workspaceXpPerReward(k));
const workspaceXpIntoCycle = (k, xpVal) => (xpVal||0) % workspaceXpPerReward(k);
const workspacePctInto = (k, xpVal) => Math.round(workspaceXpIntoCycle(k, xpVal) / workspaceXpPerReward(k) * 100);

/* ============================================================
   MIGRATION — bring legacy saves into the new model safely.
   Old shape: { plants, lights, lotuses, xp:Number, coins, books:[{title}] }
   ============================================================ */
function migrate(saved){
  if (!saved || typeof saved !== "object") return blankState();
  const base = blankState();
  // shallow copy known scalar/array fields
  const out = { ...base, ...saved };
  // normalise xp: old global number -> object
  if (typeof saved.xp === "number" || saved.xp == null) {
    out.xp = { ...base.xp };
    // legacy global xp was fitness-driven; preserve it there
    if (typeof saved.xp === "number") out.xp.fitness = saved.xp;
    // legacy counters -> equivalent xp so visuals persist
    if (typeof saved.plants === "number")  out.xp.relationships = saved.plants * SECTIONS.relationships.xp;
    if (typeof saved.lights === "number")  out.xp.environment   = saved.lights * SECTIONS.environment.xp;
    if (typeof saved.lotuses === "number") out.xp.spirituality  = saved.lotuses * SECTIONS.spirituality.xp;
  } else {
    out.xp = { ...base.xp, ...saved.xp };
  }
  // books: ensure {title, quote}
  out.books = Array.isArray(saved.books) ? saved.books.map(b => ({ title: b.title || "Untitled", quote: b.quote || "" })) : [];
  // workspace fields — safe defaults if missing
  out.instagramHandle = saved.instagramHandle || "";
  out.linkedinName    = saved.linkedinName    || "";
  out.linkedinSkills  = Array.isArray(saved.linkedinSkills) ? saved.linkedinSkills : [];
  out.cheques         = Array.isArray(saved.cheques) ? saved.cheques : [];
  out.workspaceView   = saved.workspaceView || "desktop";
  out.travelList  = Array.isArray(saved.travelList) ? saved.travelList : [];
  out.oracleNames = Array.isArray(saved.oracleNames) ? saved.oracleNames.slice(0,6) : [];
  out.wishes      = Array.isArray(saved.wishes) ? saved.wishes.slice(0,3) : [];
  out.dreamBook   = Array.isArray(saved.dreamBook) ? saved.dreamBook.slice(0,15) : [];
  // productivity fields — safe defaults if missing
  out.streak   = (saved.streak && typeof saved.streak==="object") ? { count:saved.streak.count||0, best:saved.streak.best||0, lastDay:saved.streak.lastDay||null } : { count:0, best:0, lastDay:null };
  out.focusDay = saved.focusDay || null;
  out.focusIds = Array.isArray(saved.focusIds) ? saved.focusIds.slice(0,3) : [];
  out.tasks    = Array.isArray(out.tasks) ? out.tasks.map(t=>({ recur:null, due:null, lastDone:null, ...t })) : [];
  out.futureLetters = Array.isArray(saved.futureLetters) ? saved.futureLetters : [];
  // drop obsolete keys so they don't linger
  delete out.plants; delete out.lights; delete out.lotuses;
  return out;
}

/* ============================================================
   REWARD ENGINE — given xp per category, derive what to show.
   These are pure functions used by the scenes (later phases).
   ============================================================ */
const safe = (v) => Math.max(0, Math.floor(v||0));

const Reward = {
  relationships:(xp)=>{ const flowers=Math.min(safe(stepsOf1000(xp)),32); const bigFlowers=Math.min(Math.floor((xp||0)/5000),6); const totalFlowers=flowers+bigFlowers; return { flowers, bigFlowers, totalFlowers, dogUnlocked: totalFlowers>=30 }; },
  fitness:      (xp)=>{ const st=safe(stepsOf1000(xp)); return { veg: Math.min(st,36), house: st>=1, lush: Math.max(0,Math.min(1,(st-6)/30)) }; },
  environment:  (xp)=>{ const bees=Math.min(safe(stepsOf1000(xp)),15); return { bees, constellations: Math.min(Math.floor(bees/3),5) }; },
  spirituality: (xp)=>{
    const steps = Math.min(safe(stepsOf1000(xp)), 21);
    const SWAN_STEPS = [7,14,21];
    const swans = SWAN_STEPS.filter(s=>steps>=s).length;
    const lotuses = steps - swans; // every step is a lotus, except the 3 swan-steps
    return { lotuses, swans, swanRightUnlocked: swans>=1, swanLeftUnlocked: swans>=2, swanThirdUnlocked: swans>=3 };
  },
  /* Inner Child no longer uses the shared 500-XP stage ladder. Instead it drives four
     independent witch-room rewards, each with its own cadence:
       - Mysterious Book:  always clickable; one new entry per 1000 XP, capped at 15
       - Time-Travel Portal: locked until 5000 XP, then infinite random-age draws
       - Love Potion Pond:   locked until 10000 XP, then infinite ephemeral draws
       - Fortune Ball:       locked until 15000 XP, then draws from whatever dream-book
                             entries have been written so far (does not require the book to be full) */
  innerChild:   (xp)=>{
    const v = xp||0;
    return {
      dreamEntriesDue: Math.min(safe(stepsOf1000(v)), DREAM_BOOK_CAP),
      portalUnlocked: v >= TIME_TRAVEL_UNLOCK_XP,
      pondUnlocked: v >= LOVE_POTION_UNLOCK_XP,
      fortuneUnlocked: v >= FORTUNE_BALL_UNLOCK_XP,
    };
  },
};

/* ── Secret portal (witch room) — Inner Child reward thresholds ───────────── */
const DREAM_BOOK_CAP = 15;                 // max entries the mysterious book will ever hold
const TIME_TRAVEL_UNLOCK_XP = 5000;        // portal becomes clickable at this Inner Child XP
const LOVE_POTION_UNLOCK_XP = 10000;       // pond becomes clickable at this Inner Child XP
const FORTUNE_BALL_UNLOCK_XP = 15000;      // fortune ball becomes clickable at this Inner Child XP (independent of book fill state)
/* how many un-spent dream-entry slots the book has right now (earned thousands minus entries already written) */
const dreamEntriesAvailable = (innerChildXp, dreamBook) =>
  Math.max(0, Math.min(safe(stepsOf1000(innerChildXp||0)), DREAM_BOOK_CAP) - (dreamBook?.length||0));

/* number of books that SHOULD exist given reading xp (one per 1000) */
const booksDue = (readingXp) => stepsOf1000(readingXp);
/* how many un-spent book slots the shelf has right now (earned thousands minus books already added) */
const READING_BOOK_CAP = 24;
const booksAvailable = (readingXp, books) => Math.max(0, Math.min(stepsOf1000(readingXp||0), READING_BOOK_CAP) - (books?.length||0));

/* ── Workspace derived helpers ─────────────────────────────────── */
// Instagram followers: 1,500 per Creativity task completed
const igFollowers = (creativityXp) => Math.floor((creativityXp||0) / SECTIONS.creativity.xp) * 1500;

// LinkedIn connections: 150 per Skills task completed
const liConnections = (skillsXp) => Math.floor((skillsXp||0) / SECTIONS.skills.xp) * 150;

// Gross earned: ₹10,000 per Business task, until ₹20L — then a 10x multiplier kicks in (₹1,00,000/task)
const BIZ_MULT_XP = 30000;        // businessXp needed to reach ₹20L at the base rate (200 tasks x ₹10,000)
const BIZ_MULT_BASE = 2000000;    // ₹20L — the multiplier threshold
const earned = (businessXp) => {
  const xp = businessXp||0;
  if(xp <= BIZ_MULT_XP) return Math.floor(xp/SECTIONS.business.xp)*10000;
  const extraXp = xp - BIZ_MULT_XP;
  return BIZ_MULT_BASE + Math.floor(extraXp/SECTIONS.business.xp)*100000;
};
const bizMultActive = (businessXp) => earned(businessXp) >= BIZ_MULT_BASE;

// Live preview of what THIS task (at its currently chosen XP) would grow, shown while
// dragging the Add-tab slider. Uses the same base ratios as igFollowers/liConnections/earned
// above, but scales continuously with xp rather than stepping in whole-task increments.
const rewardPreview = (section, xp, currentBusinessXp) => {
  xp = xp||0;
  if(section==="creativity") return `${Math.round(xp*(1500/SECTIONS.creativity.xp)).toLocaleString("en-US")} Instagram followers`;
  if(section==="skills")     return `${Math.round(xp*(150/SECTIONS.skills.xp)).toLocaleString("en-US")} LinkedIn connections`;
  if(section==="business"){
    // Rate depends on which tier the player's CURRENT accumulated business XP is already in:
    // 150XP=₹10,000 before the ₹20L/30,000-XP line, 150XP=₹1,00,000 after it.
    const postMult = (currentBusinessXp||0) > BIZ_MULT_XP;
    const rate = postMult ? 100000 : 10000;
    return `${fmtINR(xp*(rate/SECTIONS.business.xp))} in your bank${postMult?" (10x rate)":""}`;
  }
  return SECTIONS[section].reward;
};

// Bank balance: gross earned minus cheque deductions
const bankBalance = (businessXp, cheques=[]) => {
  const spent = (cheques||[]).reduce((a,c)=>a+(c.amount||0),0);
  return Math.max(0, earned(businessXp) - spent);
};

// Skills milestone: one skill input per 3,000 connections
const skillsDue = (skillsXp) => Math.floor(liConnections(skillsXp) / 3000);

// Letter unlocks, easiest to toughest: 1=Cannes Lions(10k), 2=Harvard keynote(20k), 3=Savoir(35k), 4=Taylor(50k)
const lettersUnlocked = (skillsXp) => {
  const c = liConnections(skillsXp);
  if(c>=50000) return 4; if(c>=35000) return 3; if(c>=20000) return 2; if(c>=10000) return 1; return 0;
};

// DM milestone: one per 15k followers (alternates fan→collab→fan…)
const dmsDue = (creativityXp) => Math.floor(igFollowers(creativityXp) / 15000);

// Business class tickets: every 3,750 XP (= ₹2,50,000 at the base 150XP=₹10,000 rate), capped
// at 8 — which lands exactly on the ₹20L / 30,000-XP multiplier line (8 × 3,750 = 30,000).
// Tickets do NOT keep accumulating past that point. Instead, business letters (YC / Business
// Today / Oprah) and the Forbes poster become the reward series for that tier, spaced 3,000 XP
// apart (see bizLettersUnlocked/forbesUnlocked below) since 150XP=₹1,00,000 post-threshold.
// Floor-division means this fires the FIRST time cumulative XP crosses each threshold, even if
// a single custom-XP task jumps past it — not only on an exact match.
const TICKET_XP_PRE = 3750;   // XP per ticket, pre-₹20L
const BIZ_TICKET_CAP = 8;     // tickets never exceed this
const ticketsDue = (businessXp) => Math.min(Math.floor((businessXp||0) / TICKET_XP_PRE), BIZ_TICKET_CAP);

// Business's reward cadence changes tier at the ₹20L / 30,000-XP line: 3,750 XP/reward (tickets)
// before it, 3,000 XP/reward (letters/Forbes) after — used by the Log/Haven progress bars so
// the "XP to next" readout matches whichever tier the player is actually in.
const TICKET_XP_POST = 3000;  // XP per reward, post-₹20L (letters/Forbes tier)
const businessCadenceXp = (xp) => (xp||0) <= BIZ_MULT_XP ? TICKET_XP_PRE : TICKET_XP_POST;
const businessXpIntoCycle = (xp) => (xp||0) <= BIZ_MULT_XP ? ((xp||0) % TICKET_XP_PRE) : (((xp||0) - BIZ_MULT_XP) % TICKET_XP_POST);
const businessPctInto = (xp) => Math.round(businessXpIntoCycle(xp) / businessCadenceXp(xp) * 100);

// Forbes poster unlocks at ₹1 crore earned
const forbesUnlocked = (businessXp) => earned(businessXp) >= 10000000;

// Business milestone letters, easiest to toughest: 1=YC term sheet(40L), 2=Business Today cover(60L), 3=Oprah interview(80L)
const bizLettersUnlocked = (businessXp) => {
  const e = earned(businessXp);
  if(e>=8000000) return 3; if(e>=6000000) return 2; if(e>=4000000) return 1; return 0;
};

// Total business "rewards earned" for the Log/Haven big-number: tickets (capped at 8) plus,
// once past the ₹20L line, business letters and the Forbes poster (the next reward series).
const businessRewardsEarned = (businessXp) => {
  const t = ticketsDue(businessXp); // already capped at 8
  if((businessXp||0) <= BIZ_MULT_XP) return t;
  return t + bizLettersUnlocked(businessXp) + (forbesUnlocked(businessXp) ? 1 : 0);
};

// Workspace total XP for room evolution
const workspaceXp = (xp) => (xp.business||0)+(xp.skills||0)+(xp.creativity||0);

const fmtINR = (n) => {
  n = Math.round(n); const s = String(Math.abs(n));
  let last3 = s.slice(-3), rest = s.slice(0,-3);
  if(rest) last3 = "," + last3;
  rest = rest.replace(/\B(?=(\d{2})+(?!\d))/g,",");
  return (n<0?"-₹":"₹") + rest + last3;
};
const fmtCompact = (n) => {
  if(n>=10000000) return "₹"+(n/10000000).toFixed(2)+"Cr";
  if(n>=1000000)  return "₹"+(n/100000).toFixed(1)+"L";
  return fmtINR(n);
};
const fmtNum = (n) => {
  if(n>=1000000) return (n/1000000).toFixed(n%1000000===0?0:1)+"M";
  if(n>=1000)    return (n/1000).toFixed(n%1000===0?0:1)+"k";
  return String(n);
};

function prettyAuthError(e){
  const c=(e&&e.code)||"";
  if(c.includes("email-already-in-use"))return "That email already has an account — try signing in.";
  if(c.includes("invalid-email"))return "That doesn’t look like a valid email.";
  if(c.includes("weak-password"))return "Password should be at least 6 characters.";
  if(c.includes("wrong-password")||c.includes("invalid-credential"))return "Wrong email or password.";
  if(c.includes("user-not-found"))return "No account with that email — create one first.";
  if(c.includes("too-many-requests"))return "Too many tries — wait a moment and retry.";
  return (e&&e.message)?e.message:"Could not sign in.";
}

function App(){
  const [user,setUser]=useState(undefined);
  const [localMode,setLocalMode]=useState(false);
  const [pendingHandles,setPendingHandles]=useState(null); // {igHandle, liName} from signup
  useEffect(()=>{
    if(fb){ return fb.auth.onAuthStateChanged(u=>setUser(u||null)); }
    setUser(null);
  },[]);
  if(user===undefined) return <Centered>Looking for your haven…</Centered>;
  if(!user && !localMode) return <AuthScreen
    onLocal={()=>setLocalMode(true)}
    onSetHandles={(ig,li)=>setPendingHandles({igHandle:ig,liName:li})} />;
  return <Haven user={user} localMode={localMode} pendingHandles={pendingHandles}
    onSignOut={()=>{ if(fb) fb.auth.signOut(); setLocalMode(false); setPendingHandles(null); }} />;
}
function Centered({children}){ return <div style={{fontStyle:"italic",color:"#9a866f",textAlign:"center",padding:"70px 20px"}}>{children}</div>; }

function AuthScreen({onLocal, onSetHandles}){
  const [igHandle,setIgHandle]=useState("");
  const [liName,setLiName]=useState("");
  const [mode,setMode]=useState("in");
  const [email,setEmail]=useState(""), [pw,setPw]=useState(""), [name,setName]=useState("");
  const [busy,setBusy]=useState(false), [err,setErr]=useState("");
  const submit=async()=>{
    setErr(""); setBusy(true);
    try{
      if(!fb){ onSetHandles&&onSetHandles(igHandle.trim()||'@you',liName.trim()||'You'); onLocal(); return; }
      if(mode==="up"){ const cred=await fb.auth.createUserWithEmailAndPassword(email.trim(),pw); if(name.trim()) await cred.user.updateProfile({displayName:name.trim()}); onSetHandles&&onSetHandles(igHandle.trim()||'@'+email.split('@')[0], liName.trim()||name.trim()||email.split('@')[0]); }
      else { await fb.auth.signInWithEmailAndPassword(email.trim(),pw); }
    }catch(e){ setErr(prettyAuthError(e)); } finally{ setBusy(false); }
  };
  return (
    <div style={ST.authWrap}><div style={ST.authCard}>
      <div style={ST.crest}>✦</div>
      <h1 style={ST.authTitle}>Quest Haven</h1>
      <p style={ST.authSub}>a little world that grows with what you finish</p>
      {!fb && <div style={ST.localNote}>Cloud login isn’t set up, so you can begin in <b>local mode</b> (saves to this device).</div>}
      {fb && <>
        <div style={ST.segRow}>
          <button onClick={()=>setMode("in")} style={{...ST.seg,...(mode==="in"?ST.segOn:{})}}>Sign in</button>
          <button onClick={()=>setMode("up")} style={{...ST.seg,...(mode==="up"?ST.segOn:{})}}>Create account</button>
        </div>
        {mode==="up" && <>
          <input style={ST.input} placeholder="Your name (optional)" value={name} onChange={e=>setName(e.target.value)} />
          <input style={ST.input} placeholder="Instagram handle (e.g. @maya)" value={igHandle} onChange={e=>setIgHandle(e.target.value)} />
          <input style={ST.input} placeholder="LinkedIn name (e.g. Maya Sharma)" value={liName} onChange={e=>setLiName(e.target.value)} />
        </>}
        <input style={ST.input} placeholder="Email" type="email" autoCapitalize="none" value={email} onChange={e=>setEmail(e.target.value)} />
        <input style={ST.input} placeholder="Password" type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")submit();}} />
        {err && <div style={ST.authErr}>{err}</div>}
      </>}
      <button onClick={submit} disabled={busy} style={ST.authBtn}>{busy?"…":fb?(mode==="up"?"Begin your haven":"Enter"):"Start in local mode"}</button>
      {fb && <button onClick={onLocal} style={ST.linkBtn}>or play locally without an account</button>}
    </div></div>
  );
}

/* ============================================================
   HAVEN — main app
   ============================================================ */
function Haven({ user, localMode, onSignOut, pendingHandles }){
  const [state,setState]=useState(blankState());
  const [loaded,setLoaded]=useState(false);
  const [tab,setTab]=useState("haven");          // haven | add | log | gatcha
  const [view,setView]=useState("exterior");     // exterior | interior | secret
  const [draftText,setDraftText]=useState("");
  const [draftSection,setDraftSection]=useState("reading");
  const [draftXp,setDraftXp]=useState(SECTIONS.reading.xp); // customisable per-task XP, defaults to the section's base value
  const [draftRecur,setDraftRecur]=useState(null);   // null | "daily" | "weekly"
  const [draftDue,setDraftDue]=useState("");         // "YYYY-MM-DD" or ""
  const [drawn,setDrawn]=useState(null);
  const [rolling,setRolling]=useState(false);
  const [drawnRarity,setDrawnRarity]=useState(null);   // rarity blessing on the current draw
  const [timerEnd,setTimerEnd]=useState(null);         // focus-timer end timestamp
  const [timerLeft,setTimerLeft]=useState(0);
  const [timerMins,setTimerMins]=useState(25);
  const [timerSec,setTimerSec]=useState("fitness");    // realm the focus bonus lands in
  const [showTaskPopup,setShowTaskPopup]=useState(false);   // task card floats over the scene when drawn from the gatcha hotspot
  const [flash,setFlash]=useState(null);
  const [reward,setReward]=useState(null);        // {section, taskId} pending input (reading quote / skills skill)
  const [rTitle,setRTitle]=useState(""); const [rQuote,setRQuote]=useState("");
  const [skillInput,setSkillInput]=useState("");   // skills milestone input
  const [skillOpen,setSkillOpen]=useState(false);  // skill modal (from laptop overlay)
  const [chequeModal,setChequeModal]=useState(false); // cheque book open
  const [chequePayee,setChequePayee]=useState(""); const [chequeAmt,setChequeAmt]=useState("");
  const [chequeMsg,setChequeMsg]=useState({text:"",kind:""}); // inline feedback — never use alert(), it is silently swallowed in sandboxed/embedded webviews
  const [laptopView,setLaptopView]=useState("desktop"); // desktop|instagram|linkedin|bank
  const [laptopOpen,setLaptopOpen]=useState(false);     // full-screen laptop overlay
  const [igSub,setIgSub]=useState("feed");              // feed|dms
  const [liSub,setLiSub]=useState("profile");           // profile|msgs
  const [wsTab,setWsTab]=useState("overview");          // overview|instagram|linkedin|bank — top-level laptop nav
  const [letterOpen,setLetterOpen]=useState(false);     // letter overlay
  const [letterKey,setLetterKey]=useState("harvard");   // harvard|savoir|taylor
  const [bookView,setBookView]=useState(null);           // book being viewed
  const [shelfOpen,setShelfOpen]=useState(false);        // full bookshelf overlay grid
  const [addBookOpen,setAddBookOpen]=useState(false);     // add-a-book modal (spends 1000 reading XP)
  const [profileModal,setProfileModal]=useState(false);   // edit Instagram handle / LinkedIn name
  const [igDraft,setIgDraft]=useState("");
  const [liDraft,setLiDraft]=useState("");
  const [profileMsg,setProfileMsg]=useState("");
  const openProfileModal=()=>{
    setIgDraft(state.instagramHandle||"");
    setLiDraft(state.linkedinName||"");
    setProfileMsg("");
    setProfileModal(true);
  };
  const saveProfile=()=>{
    const ig=igDraft.trim();
    const li=liDraft.trim();
    setState(s=>({...s, instagramHandle: ig?(ig.startsWith("@")?ig:"@"+ig):"", linkedinName: li}));
    setProfileMsg("Saved ✓");
    setTimeout(()=>{ setProfileModal(false); setProfileMsg(""); },700);
  };
  const [, setClockTick] = useState(0);                   // forces periodic re-render so day/night visuals update live
  const [catOpen,setCatOpen]=useState(false);              // fireplace cat — oracle & two-paths chooser
  const [catAnswer,setCatAnswer]=useState(null);           // ephemeral flavored answer from the cat
  const [catQ,setCatQ]=useState("");                       // optional typed question (never stored)
  const [catOptA,setCatOptA]=useState(""); const [catOptB,setCatOptB]=useState("");
  const [catPick,setCatPick]=useState(null);               // which path the cat padded toward
  const [travelOpen,setTravelOpen]=useState(false);        // globe milestone — travel checklist
  const [travelDraft,setTravelDraft]=useState("");
  const [oracleOpen,setOracleOpen]=useState(false);        // teacup milestone — "what would they do?"
  const [oracleEditing,setOracleEditing]=useState(false);
  const [oracleDraftNames,setOracleDraftNames]=useState(["","","","","",""]);
  const [oraclePick,setOraclePick]=useState(null);
  const [wishesOpen,setWishesOpen]=useState(false);        // maneki neko milestone — 3 wishes
  const [wishDrafts,setWishDrafts]=useState(["","",""]);
  const [deliveryPick,setDeliveryPick]=useState(null);       // "Out for delivery" — random wish pick
  const [oracleDilemma,setOracleDilemma]=useState("");       // teacup — optional "what are you weighing?"
  const [capsuleDraft,setCapsuleDraft]=useState("");         // time capsule — letter being written
  const [capsuleDate,setCapsuleDate]=useState("");           // time capsule — chosen opening day
  const [capsuleRead,setCapsuleRead]=useState(null);         // time capsule — letter being read
  // ── Secret portal (witch room) — Inner Child rewards ──────────
  const [dreamBookOpen,setDreamBookOpen]=useState(false);    // mysterious book — always clickable
  const [dreamDraft,setDreamDraft]=useState("");
  const [timeTravelOpen,setTimeTravelOpen]=useState(false);  // time-travel portal — unlocked at 5000 XP
  const [timeTravelAge,setTimeTravelAge]=useState(null);
  const [timeTravelPromptText,setTimeTravelPromptText]=useState("");
  const [potionOpen,setPotionOpen]=useState(false);          // love potion pond — unlocked at 10000 XP
  const [potionName,setPotionName]=useState("");
  const [potionResult,setPotionResult]=useState(null);
  const [potionLine,setPotionLine]=useState(null);           // whimsical line chosen at brew time
  const [rippling,setRippling]=useState(false);               // brief ripple animation when the wish is sent off
  const [fortuneOpen,setFortuneOpen]=useState(false);         // fortune ball — unlocked at 15000 Inner Child XP
  const [fortunePick,setFortunePick]=useState(null);
  useEffect(()=>{
    const id = setInterval(()=>setClockTick(t=>t+1), 60000); // recheck every minute
    return ()=>clearInterval(id);
  }, []);
  const saveTimer=useRef(null);
  const cloudId=(fb&&user)?user.uid:null;

  useEffect(()=>{
    (async()=>{
      let data=null;
      try{ if(cloudId) data=await Store.loadCloud(cloudId); if(!data) data=Store.loadLocal(); }catch(e){}
      if(data) setState(s => {
        const migrated = migrate(data);
        // apply pendingHandles from signup if not already set
        if(pendingHandles && !migrated.instagramHandle) migrated.instagramHandle = pendingHandles.igHandle;
        if(pendingHandles && !migrated.linkedinName) migrated.linkedinName = pendingHandles.liName;
        return migrated;
      });
      else if(pendingHandles) setState(s=>({...s, instagramHandle:pendingHandles.igHandle, linkedinName:pendingHandles.liName}));
      setLoaded(true);
    })();
  },[]);

  useEffect(()=>{
    if(!loaded) return;
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      Store.saveLocal(state);
      if(cloudId){ try{ await Store.saveCloud(cloudId,state); }catch(e){} }
    },400);
  },[state,loaded]);

  const n=state.shuffle.filter(id=>{ const t=state.tasks.find(x=>x.id===id); return t && taskAvailable(t); }).length;
  const drawnTask=drawn?state.tasks.find(t=>t.id===drawn):null;

  const addTask=()=>{
    const text=draftText.trim(); if(!text) return;
    setState(s=>{ const t={id:uid(),text,section:draftSection,xp:draftXp,recur:draftRecur,due:draftRecur?null:(draftDue||null),lastDone:null}; return {...s,tasks:[...s.tasks,t],shuffle:shuffleArray([...s.shuffle,t.id])}; });
    setDraftText(""); setDraftDue("");
  };
  const selectDraftSection=(k)=>{ setDraftSection(k); setDraftXp(SECTIONS[k].xp); };

  const rollGatcha=()=>{
    if(n===0||rolling) return;
    setDrawn(null); setDrawnRarity(null); setReward(null); setRolling(true);
    setState(s=>({...s,shuffle:shuffleArray(s.shuffle)}));
    setTimeout(()=>{ setState(s=>{ const pool=s.shuffle.filter(id=>{ const t=s.tasks.find(x=>x.id===id); return t && taskAvailable(t); }); if(pool.length){ setDrawn(pool[Math.floor(Math.random()*pool.length)]); setDrawnRarity(rollRarity()); } return s; }); setRolling(false); setShowTaskPopup(true); },1100);
  };
  const reshuffle=()=>{ setDrawn(null); rollGatcha(); };

  // effective XP for completing a task right now: base x streak (up to +20%) x focus (x1.5) x drawn rarity
  const effectiveXp=(task,s)=>{
    const baseXp = task.xp!=null ? task.xp : SECTIONS[task.section].xp;
    let mult = streakMult(s.streak);
    if(s.focusDay===todayStr() && (s.focusIds||[]).includes(task.id)) mult*=1.5;
    if(drawn===task.id && drawnRarity) mult*=drawnRarity.mult;
    return Math.round(baseXp*mult);
  };

  // complete a task by id (from gatcha OR quest log) — identical reward
  const completeTask=(task)=>{
    if(!task || !taskAvailable(task)) return;
    // Skills: prompt for a skill name when crossing a 3,000-connection milestone
    if(task.section==="skills"){
      const currentXp = state.xp.skills || 0;
      const taskXp = effectiveXp(task, state);
      const newXp = currentXp + taskXp;
      if(skillsDue(newXp) > skillsDue(currentXp)){
        setReward({section:"skills", taskId:task.id});
        setSkillInput("");
        return;
      }
      applyCompletion(task,{}); return;
    }
    applyCompletion(task,{});
  };
  const completeDrawn=()=>completeTask(drawnTask);

  const applyCompletion=(task,extra)=>{
    const td=todayStr();
    setState(s=>{
      const isRecur=!!task.recur;
      // recurring quests stay in the list (and gatcha pool) but rest until their next period
      const tasks=isRecur
        ? s.tasks.map(t=>t.id===task.id?{...t,lastDone:{day:td,week:weekKeyStr()}}:t)
        : s.tasks.filter(t=>t.id!==task.id);
      const shuffle=isRecur ? s.shuffle : shuffleArray(s.shuffle.filter(id=>id!==task.id));
      const taskXp = effectiveXp(task, s);
      const xp={...s.xp, [task.section]:(s.xp[task.section]||0)+taskXp};
      // daily streak — at least one completed quest a day keeps the flame alive
      let streak=s.streak||{count:0,best:0,lastDay:null};
      if(streak.lastDay!==td){
        const c = streak.lastDay===yesterdayStr() ? (streak.count||0)+1 : 1;
        streak={ count:c, best:Math.max(streak.best||0,c), lastDay:td };
      }
      const focusIds=isRecur ? (s.focusIds||[]) : (s.focusIds||[]).filter(f=>f!==task.id);
      const ns={...s,tasks,shuffle,xp,streak,focusIds,history:[task.text,...s.history].slice(0,40)};
      // Skills: mint a skill ONLY when skill name is explicitly provided (from the prompt)
      if(task.section==="skills" && extra.skill){
        ns.linkedinSkills=[...s.linkedinSkills, { skill: extra.skill }];
      }
      return ns;
    });
    setDrawn(null); setDrawnRarity(null); setReward(null); setRTitle(""); setRQuote(""); setShowTaskPopup(false);
    setFlash({section:task.section}); setTimeout(()=>setFlash(null),1900);
  };

  const confirmAddBook=()=>{
    if(booksAvailable(state.xp.reading, state.books)<=0) return;
    setState(s=>({...s, books:[...s.books, { title: rTitle.trim()||"Untitled", quote: rQuote.trim() }]}));
    setAddBookOpen(false); setRTitle(""); setRQuote("");
    setShelfOpen(true);
  };

  // ── Reading nook milestone rewards ──────────────────────────────
  const clickCat=()=>{ setCatQ(""); setCatOptA(""); setCatOptB(""); setCatAnswer(null); setCatPick(null); setCatOpen(true); };
  const askCat=()=>{ const r=Math.random(); const pool = r<0.45?CAT_YES : r<0.90?CAT_NO : CAT_HEDGE; setCatAnswer(pool[Math.floor(Math.random()*pool.length)]); };
  const catChoose=()=>{ const a=catOptA.trim(), b=catOptB.trim(); if(!a||!b) return; setCatPick(Math.random()<0.5?a:b); };

  const addTravelItem=()=>{
    const text = travelDraft.trim();
    if(!text) return;
    setState(s=>({...s, travelList:[...s.travelList, { id: uid(), text, done:false }]}));
    setTravelDraft("");
  };
  const toggleTravelItem=(id)=>{
    setState(s=>({...s, travelList: s.travelList.map(it=>it.id===id?{...it,done:!it.done}:it)}));
  };
  const removeTravelItem=(id)=>{
    setState(s=>({...s, travelList: s.travelList.filter(it=>it.id!==id)}));
  };
  const moveTravelItem=(id,dir)=>{
    setState(s=>{
      const list=[...s.travelList];
      const i=list.findIndex(it=>it.id===id);
      const j=i+dir;
      if(i<0||j<0||j>=list.length) return s;
      [list[i],list[j]]=[list[j],list[i]];
      return {...s, travelList:list};
    });
  };

  const openOracle=()=>{
    if((state.oracleNames||[]).length < 1){
      setOracleDraftNames(Array(6).fill(""));
      setOracleEditing(true);
    } else {
      const pick = state.oracleNames[Math.floor(Math.random()*state.oracleNames.length)];
      setOraclePick(pick);
      setOracleEditing(false);
    }
    setOracleDilemma("");
    setOracleOpen(true);
  };
  const saveOracleNames=()=>{
    const names = oracleDraftNames.map(n=>n.trim()).filter(Boolean);
    if(names.length < 1) return; // need at least one name before it can be used as an oracle
    setState(s=>({...s, oracleNames: names.slice(0,6)}));
    setOracleEditing(false);
    setOraclePick(null);
  };

  const openWishes=()=>{
    const current = state.wishes||[];
    setWishDrafts([current[0]||"", current[1]||"", current[2]||""]);
    setWishesOpen(true);
  };
  const saveWishes=()=>{
    setState(s=>({...s, wishes: wishDrafts.map(w=>w.trim())}));
    setWishesOpen(false);
  };
  const orderWish=()=>{
    const filled = (state.wishes||[]).filter(w=>w && w.trim());
    if(filled.length===0) return;
    setDeliveryPick(filled[Math.floor(Math.random()*filled.length)]);
  };

  // ── Secret portal (witch room) milestone rewards ────────────────
  const DREAM_ENTRY_MAXLEN = 80; // enforces the "one line" feel of a journal entry

  const openDreamBook=()=>{ setDreamDraft(""); setDreamBookOpen(true); };
  const addDreamEntry=()=>{
    const text = dreamDraft.trim().slice(0, DREAM_ENTRY_MAXLEN);
    if(!text) return;
    if(dreamEntriesAvailable(state.xp.innerChild, state.dreamBook) <= 0) return;
    setState(s=>({...s, dreamBook:[...(s.dreamBook||[]), text]}));
    setDreamDraft("");
  };

  const openTimeTravel=()=>{
    const a=1 + Math.floor(Math.random()*90);
    setTimeTravelAge(a); setTimeTravelPromptText(timeTravelPrompt(a));
    setTimeTravelOpen(true);
  };
  const meetAgain=()=>{ const a=1 + Math.floor(Math.random()*90); setTimeTravelAge(a); setTimeTravelPromptText(timeTravelPrompt(a)); };

  const openPotion=()=>{ setPotionName(""); setPotionResult(null); setPotionOpen(true); };
  const brewPotion=()=>{
    const name = potionName.trim();
    if(!name) return;
    // Deliberately not stored anywhere: name and result exist only in this transient component state.
    setPotionLine(POTION_LINES[Math.floor(Math.random()*POTION_LINES.length)].split("{name}").join(name));
    setPotionResult(name);
  };
  const closePotion=()=>{ setPotionOpen(false); setPotionName(""); setPotionResult(null); setPotionLine(null); setRippling(false); };
  const sendByRipples=()=>{
    setRippling(true);
    setTimeout(closePotion, 900); // let the ripple animation finish before the modal closes
  };

  const openFortuneBall=()=>{
    const entries = state.dreamBook||[];
    setFortunePick(entries.length ? entries[Math.floor(Math.random()*entries.length)] : null);
    setFortuneOpen(true);
  };
  const askFortuneAgain=()=>{
    const entries = state.dreamBook||[];
    if(entries.length===0) return;
    setFortunePick(entries[Math.floor(Math.random()*entries.length)]);
  };

  // ── Time capsule — letters to future you (workspace laptop) ────
  const sealLetter=()=>{
    const text=capsuleDraft.trim();
    if(!text||!capsuleDate) return;
    setState(s=>({...s, futureLetters:[...(s.futureLetters||[]), {id:uid(), text, openOn:capsuleDate, created:todayStr(), opened:false}]}));
    setCapsuleDraft(""); setCapsuleDate("");
  };
  const readCapsule=(l)=>{
    if(l.openOn>todayStr()) return; // still sealed
    setCapsuleRead(l);
    setState(s=>({...s, futureLetters:(s.futureLetters||[]).map(x=>x.id===l.id?{...x,opened:true}:x)}));
  };

  const confirmSkill=()=>{
    const task=state.tasks.find(t=>t.id===reward.taskId);
    if(task) applyCompletion(task,{skill:skillInput.trim()||"New Skill"});
    setReward(null); setSkillInput("");
  };

  const issueCheque=()=>{
    const amount=parseInt(String(chequeAmt).replace(/[^0-9]/g,""),10);
    if(!chequePayee.trim()){ setChequeMsg({text:"Enter a payee first.",kind:"err"}); return; }
    if(!amount||amount<=0){ setChequeMsg({text:"Enter a valid amount.",kind:"err"}); return; }
    const bal=bankBalance(state.xp.business, state.cheques);
    if(amount>bal){ setChequeMsg({text:"Insufficient balance — only "+fmtCompact(bal)+" available.",kind:"err"}); return; }
    const payee=chequePayee.trim();
    const newBal=Math.max(0,bal-amount);
    setState(s=>({...s, cheques:[...s.cheques,{payee,amount,date:new Date().toLocaleDateString("en-IN")}]}));
    setChequePayee(""); setChequeAmt("");
    setChequeMsg({text:"Cheque signed — "+fmtCompact(amount)+" to "+payee+". New balance: "+fmtCompact(newBal)+".",kind:"ok"});
  };

  const deleteTask=(id)=>{
    setState(s=>({...s, tasks:s.tasks.filter(t=>t.id!==id), shuffle:s.shuffle.filter(x=>x!==id), focusIds:(s.focusIds||[]).filter(f=>f!==id)}));
    if(drawn===id){ setDrawn(null); setDrawnRarity(null); }
  };

  // ── Daily focus — star up to 3 quests for x1.5 XP today ────────
  const toggleFocus=(id)=>{
    const td=todayStr();
    setState(s=>{
      let ids=(s.focusDay===td)?(s.focusIds||[]):[];
      if(ids.includes(id)) ids=ids.filter(x=>x!==id);
      else { if(ids.length>=3) return s; ids=[...ids,id]; }
      return {...s, focusDay:td, focusIds:ids};
    });
  };

  // ── Focus timer — finish a session, bank bonus XP (2 XP/min) ───
  useEffect(()=>{
    if(!timerEnd) return;
    const iv=setInterval(()=>{
      const left=timerEnd-Date.now();
      if(left<=0){
        clearInterval(iv);
        const bonus=timerMins*2, sect=timerSec;
        setState(s=>({...s, xp:{...s.xp, [sect]:(s.xp[sect]||0)+bonus}}));
        setFlash({section:sect}); setTimeout(()=>setFlash(null),1900);
        setTimerEnd(null); setTimerLeft(0);
      } else setTimerLeft(left);
    },400);
    return ()=>clearInterval(iv);
  },[timerEnd]);

  const who=(user&&(user.displayName||user.email))||(localMode?"wanderer":"you");
  if(!loaded) return <Centered>Unrolling the garden…</Centered>;
  const avail=booksAvailable(state.xp.reading, state.books);

  return (
    <div style={ST.shell}>
      <header style={ST.header}>
        <div>
          <div style={ST.title}>Quest Haven</div>
          <div style={ST.sub}>{view==="secret"?"the portal garden":view==="workspace"?"the workspace":view==="reading"?"the reading nook":view==="greenhouse"?"the greenhouse":`welcome back, ${who}`}</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span title={`best streak: ${(state.streak&&state.streak.best)||0} days`} style={{fontSize:12,fontWeight:600,color:"#b84e36",border:"1px solid #ecd0b0",background:"#fdf0e0",borderRadius:16,padding:"6px 10px"}}>🔥 {streakShown(state.streak)}</span>
          <button onClick={openProfileModal} style={{...ST.signOut,background:"transparent",border:"1px solid #d8d0c8",color:"#6b5a4a"}}>Profile</button>
          <button onClick={onSignOut} style={ST.signOut}>{fb&&user?"Sign out":"Exit"}</button>
        </div>
      </header>

      <div style={ST.stage}>
        <SceneHost view={view} setView={setView} state={state} flash={flash}
          setTab={setTab}
          rolling={rolling} drawnTask={drawnTask} onRoll={rollGatcha} reshuffle={reshuffle}
          laptopOpen={laptopOpen} setLaptopOpen={setLaptopOpen}
          igSub={igSub} setIgSub={setIgSub}
          liSub={liSub} setLiSub={setLiSub}
          wsTab={wsTab} setWsTab={setWsTab}
          letterOpen={letterOpen} setLetterOpen={setLetterOpen}
          letterKey={letterKey} setLetterKey={setLetterKey}
          skillOpen={skillOpen} setSkillOpen={setSkillOpen}
          skillInput={skillInput} setSkillInput={setSkillInput}
          onSubmitSkill={confirmSkill}
          onOpenCheque={()=>{setChequeMsg({text:"",kind:""}); setChequeModal(true);}}
          onOpenBook={setBookView}
          onOpenShelf={()=>setShelfOpen(true)}
          avail={avail}
          onOpenAddBook={()=>setAddBookOpen(true)}
          onClickCat={clickCat}
          onOpenTravel={()=>setTravelOpen(true)}
          onOpenOracle={openOracle}
          onOpenWishes={openWishes}
          onOpenDreamBook={openDreamBook}
          onOpenTimeTravel={openTimeTravel}
          onOpenPotion={openPotion}
          onOpenFortuneBall={openFortuneBall}
          capsule={{draft:capsuleDraft,setDraft:setCapsuleDraft,date:capsuleDate,setDate:setCapsuleDate,seal:sealLetter,read:readCapsule}} />
      </div>

      <nav style={ST.tabs}>
        {[["gatcha",`Gatcha (${n})`],["add","Add"],["log",`Log (${state.tasks.length})`],["focus",timerEnd?"⏳…":"Focus"],["haven","Haven"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{...ST.tab,...(tab===k?ST.tabOn:{})}}>{l}</button>
        ))}
      </nav>

      <main style={ST.panel}>
        {tab==="haven" && <HavenTab state={state} onOpenBook={setBookView} />}
        {tab==="add" && <AddTab draftText={draftText} setDraftText={setDraftText} draftSection={draftSection} setDraftSection={selectDraftSection} draftXp={draftXp} setDraftXp={setDraftXp} addTask={addTask} tasks={state.tasks} currentBusinessXp={state.xp.business}
          draftRecur={draftRecur} setDraftRecur={setDraftRecur} draftDue={draftDue} setDraftDue={setDraftDue} />}
        {tab==="log" && <QuestLog state={state} onComplete={completeTask} onDelete={deleteTask} onToggleFocus={toggleFocus} />}
        {tab==="focus" && <FocusTab timerEnd={timerEnd} timerLeft={timerLeft} timerMins={timerMins} setTimerMins={setTimerMins} timerSec={timerSec} setTimerSec={setTimerSec}
          onStart={()=>{ setTimerLeft(timerMins*60000); setTimerEnd(Date.now()+timerMins*60000); }}
          onCancel={()=>{ setTimerEnd(null); setTimerLeft(0); }} />}
        {tab==="gatcha" && <GatchaPanel n={n} rolling={rolling} drawnTask={drawnTask} drawnRarity={drawnRarity} onRoll={rollGatcha} reshuffle={reshuffle} completeDrawn={completeDrawn}

          skillInput={skillInput} setSkillInput={setSkillInput}
          confirmSkill={confirmSkill}

      <footer style={ST.footer}>{cloudId?"Synced to your account across devices.":"Saved on this device."}</footer>

      {bookView && <BookModal book={bookView} onClose={()=>{setBookView(null); setShelfOpen(true);}} />}

      {shelfOpen && <BookShelfModal books={state.books} avail={avail} onOpenBook={(b)=>{setShelfOpen(false);setBookView(b);}}
        onAddBook={()=>{setShelfOpen(false);setAddBookOpen(true);}} onClose={()=>setShelfOpen(false)} />}

      {addBookOpen && (
        <div style={ST.modalWrap} onClick={()=>{setAddBookOpen(false);setRTitle("");setRQuote("");}}>
          <div style={{...ST.modalCard,maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div style={ST.modalTitle}>Add a book to the shelf</div>
            <p style={{fontSize:12,color:"#9a866f",margin:"0 0 12px"}}>Costs 1000 reading XP · {avail} slot{avail===1?"":"s"} available</p>
            <input style={ST.input} value={rTitle} onChange={e=>setRTitle(e.target.value)} placeholder="Book title" autoFocus />
            <textarea style={ST.textarea} value={rQuote} onChange={e=>setRQuote(e.target.value)} placeholder="A favourite quote from it (optional)" />
            <div style={ST.row}>
              <button onClick={confirmAddBook} disabled={avail<=0} style={{...ST.primary,opacity:avail<=0?0.5:1,cursor:avail<=0?"not-allowed":"pointer"}}>Place it on the shelf</button>
              <button onClick={()=>{setAddBookOpen(false);setRTitle("");setRQuote("");}} style={ST.ghost}>Cancel</button>
            </div>
            {avail<=0 && <p style={{fontSize:11.5,color:"#b06a3a",margin:"10px 0 0",fontStyle:"italic"}}>Complete more reading quests to earn your next 1000 XP.</p>}
          </div>
        </div>
      )}

      {/* Fireplace cat — flavored yes/no oracle + two-paths chooser (the coin-flip trick:
          your gut reaction to the cat's pick is the real answer) */}
      {catOpen && (
        <div style={ST.modalWrap} onClick={()=>setCatOpen(false)}>
          <div style={{...ST.modalCard,maxWidth:360,textAlign:"left"}} onClick={e=>e.stopPropagation()}>
            {!catPick ? (
              <>
                <div style={ST.modalTitle}>Ask the cat</div>
                <input style={ST.input} value={catQ} onChange={e=>setCatQ(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter")askCat();}}
                  placeholder="A yes-or-no question… (you may keep it secret)" />
                {catAnswer && (
                  <>
                    {catQ.trim() && <div style={{fontSize:12.5,color:"#9a866f",fontStyle:"italic"}}>“{catQ.trim()}”</div>}
                    <div style={{fontFamily:"Georgia,serif",fontSize:21,fontStyle:"italic",color:"#b84e36",margin:"8px 0 6px"}}>{catAnswer}</div>
                  </>
                )}
                <div style={ST.row}>
                  <button onClick={askCat} style={ST.primary}>{catAnswer?"Ask again":"Ask"}</button>
                  <button onClick={()=>setCatOpen(false)} style={ST.ghost}>Close</button>
                </div>
                <div style={{borderTop:"1px dashed #ddc9a8",margin:"14px 0 10px"}}/>
                <p style={{fontSize:12,color:"#9a866f",fontStyle:"italic",margin:"0 0 8px"}}>…or set down two paths and see which one the cat walks toward</p>
                <input style={{...ST.input,marginBottom:6}} value={catOptA} onChange={e=>setCatOptA(e.target.value)} placeholder="Path one" />
                <input style={{...ST.input,marginBottom:6}} value={catOptB} onChange={e=>setCatOptB(e.target.value)} placeholder="Path two" />
                <button onClick={catChoose} disabled={!catOptA.trim()||!catOptB.trim()}

              </>
            ) : (
              <>
                <div style={{fontSize:13,color:"#9a866f",fontStyle:"italic",margin:"4px 0 2px"}}>the cat pads over to</div>
                <div style={{fontFamily:"Georgia,serif",fontSize:23,fontStyle:"italic",color:"#b84e36",margin:"8px 0 10px"}}>{catPick}</div>
                <p style={{fontSize:12,color:"#9a866f",fontStyle:"italic",lineHeight:1.6,margin:"0 0 12px"}}>

                </p>
                <div style={ST.row}>
                  <button onClick={()=>setCatPick(null)} style={ST.ghost}>Ask differently</button>
                  <button onClick={()=>setCatOpen(false)} style={ST.primary}>Done</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* Globe milestone — freeform travel checklist, unlocked at 7+ books */}
      {travelOpen && (
        <div style={ST.modalWrap} onClick={()=>{setTravelOpen(false);setTravelDraft("");}}>
          <div style={{...ST.modalCard,maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div style={ST.modalTitle}>My next flight is to…</div>
            <div style={{maxHeight:220,overflowY:"auto",margin:"8px 0"}}>
              {(state.travelList||[]).length===0 && <div style={ST.dim}>Nowhere on the list yet.</div>}
              {(state.travelList||[]).map((it,idx)=>(
                <div key={it.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0"}}>
                  <input type="checkbox" checked={it.done} onChange={()=>toggleTravelItem(it.id)}/>
                  <span style={{flex:1,fontSize:14,textDecoration:it.done?"line-through":"none",color:it.done?"#a89478":"#3a2818"}}>{it.text}</span>
                  <button onClick={()=>moveTravelItem(it.id,-1)} disabled={idx===0} style={{...ST.ghost,padding:"2px 7px",fontSize:11,opacity:idx===0?0.35:1}}>↑</button>
                  <button onClick={()=>moveTravelItem(it.id,1)} disabled={idx===state.travelList.length-1} style={{...ST.ghost,padding:"2px 7px",fontSize:11,opacity:idx===state.travelList.length-1?0.35:1}}>↓</button>
                  <button onClick={()=>removeTravelItem(it.id)} style={{...ST.ghost,padding:"2px 8px",fontSize:11}}>✕</button>
                </div>
              ))}
            </div>
            <div style={ST.row}>
              <input style={ST.input} value={travelDraft} onChange={e=>setTravelDraft(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")addTravelItem();}} placeholder="Add a place…" />

            </div>
            <button onClick={()=>{setTravelOpen(false);setTravelDraft("");}} style={{...ST.ghost,marginTop:10}}>Close</button>
          </div>
        </div>
      )}

      {/* Teacup milestone — "What would they do?" name oracle, unlocked at 13+ books */}

                <div style={ST.row}>
                  <button onClick={saveOracleNames} style={ST.primary}>Save names</button>
                  <button onClick={()=>setOracleOpen(false)} style={ST.ghost}>Cancel</button>
                </div>
              </>
            ) : (
              <>
                <div style={ST.modalTitle}>What would I do if I were you?</div>
                <input style={{...ST.input,marginBottom:4}} value={oracleDilemma} onChange={e=>setOracleDilemma(e.target.value)}

                <div style={{fontFamily:"Georgia,serif",fontSize:24,fontStyle:"italic",color:"#b84e36",textAlign:"center",margin:"14px 0 6px"}}>{oraclePick}</div>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>

                  <button onClick={()=>setOracleOpen(false)} style={ST.ghost}>Close</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* Maneki neko milestone — 3 editable wishes, unlocked at 19+ books */}

        <div style={ST.modalWrap} onClick={()=>setWishesOpen(false)}>

              <button onClick={()=>setWishesOpen(false)} style={ST.ghost}>Cancel</button>
            </div>
          </div>
        </div>

      {/* Mysterious Book — Inner Child reward, always clickable, 1 entry per 1000 XP, capped at 15 */}
      {dreamBookOpen && (() => {
        const entries = state.dreamBook||[];
        const avail = dreamEntriesAvailable(state.xp.innerChild, entries);
        const full = entries.length >= DREAM_BOOK_CAP;
        return (
          <div style={ST.modalWrap} onClick={()=>{setDreamBookOpen(false);setDreamDraft("");}}>

                <div style={ST.modalTitle}>Go ahead child, live your dreams</div>

                <div style={ST.modalTitle}>Do you remember now?</div>
              ) : (
                <div style={ST.modalTitle}>The book will remind you of your dreams.</div>
              )}
              {(avail > 0 && !full) && (
                <>
                  <input style={ST.input} value={dreamDraft} maxLength={DREAM_ENTRY_MAXLEN}
                    onChange={e=>setDreamDraft(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter")addDreamEntry();}}
                    placeholder="One line, from a dream you remember…" autoFocus />
                  <div style={ST.row}>
                    <button onClick={addDreamEntry} style={ST.primary}>Write it in</button>
                  </div>
                </>
              )}

                {entries.length===0 && <div style={ST.dim}>Nothing written yet.</div>}

                  <div key={i} style={{fontSize:13.5,fontStyle:"italic",padding:"6px 0",borderBottom:"1px solid #efe2cc",color:"#5a4636"}}>“{e}”</div>
                ))}
              </div>
              <button onClick={()=>{setDreamBookOpen(false);setDreamDraft("");}} style={{...ST.ghost,marginTop:10}}>Close</button>
            </div>
          </div>
        );
      })()}

      {/* Time-Travel Portal — Inner Child reward, unlocked at 5000 XP, infinite random-age draws */}
      {timeTravelOpen && (
        <div style={ST.modalWrap} onClick={()=>setTimeTravelOpen(false)}>
          <div style={{...ST.modalCard,maxWidth:340,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <div style={ST.modalTitle}>Meet yourself</div>
            <div style={{fontFamily:"Georgia,serif",fontSize:22,fontStyle:"italic",color:"#b84e36",margin:"16px 0"}}>
              at {timeTravelAge} years old
            </div>
            <p style={{fontSize:13,color:"#5a4636",fontStyle:"italic",lineHeight:1.7,margin:"0 0 16px"}}>{timeTravelPromptText}</p>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
              <button onClick={meetAgain} style={ST.primary}>Time travel</button>
              <button onClick={()=>setTimeTravelOpen(false)} style={ST.ghost}>Close</button>
            </div>
          </div>
        </div>
      )}

      {/* Love Potion Pond — Inner Child reward, unlocked at 10000 XP, ephemeral, nothing persisted */}
      {potionOpen && (
        <div style={ST.modalWrap} onClick={closePotion}>
          <div style={{...ST.modalCard,maxWidth:340,textAlign:"center",position:"relative",overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
            {potionResult ? (
              <>
                <div style={{fontFamily:"Georgia,serif",fontSize:16,fontStyle:"italic",color:"#5a4636",margin:"14px 0"}}>

                {rippling && (
                  <>

                    <span className="ripple-ring" style={{animationDelay:"150ms"}} />
                    <span className="ripple-ring" style={{animationDelay:"300ms"}} />
                  </>
                )}
              </>
            ) : (
              <>
                <div style={ST.modalTitle}>Make a wish for your beloved</div>
                <input style={ST.input} value={potionName} onChange={e=>setPotionName(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter")brewPotion();}}
                  placeholder="Name someone…" autoFocus />
                <div style={ST.row}>
                  <button onClick={brewPotion} style={ST.primary}>Toss it in</button>
                  <button onClick={closePotion} style={ST.ghost}>Cancel</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* Fortune Ball — Inner Child reward, unlocked once the mysterious book is full (15/15 entries) */}
      {fortuneOpen && (
        <div style={ST.modalWrap} onClick={()=>setFortuneOpen(false)}>
          <div style={{...ST.modalCard,maxWidth:340,textAlign:"center"}} onClick={e=>e.stopPropagation()}>

              <>
                <div style={ST.modalTitle}>Your wish will come true sooner than you realize</div>

                  "{fortunePick}"

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                  <button onClick={askFortuneAgain} style={ST.primary}>Ask again</button>
                  <button onClick={()=>setFortuneOpen(false)} style={ST.ghost}>Close</button>
                </div>
              </>
            ) : (
              <>
                <div style={ST.modalTitle}>The ball is all mist today</div>
                <p style={{fontSize:13,color:"#9a866f",fontStyle:"italic",lineHeight:1.7,margin:"6px 0 14px"}}>
                  It shows only what you've dared to write down. Put a line in the mysterious book, and the mist will part.
                </p>
                <button onClick={()=>setFortuneOpen(false)} style={ST.ghost}>Close</button>
              </>
            )}
          </div>
        </div>
      )}

      {/* Gatcha task popup — floats directly over the scene the moment a task is drawn from the gatcha hotspot, so you don't have to switch to the Gatcha tab to see it */}
      {showTaskPopup && drawnTask && (

          <div style={{...ST.drawCard,maxWidth:340,width:"100%"}} onClick={e=>e.stopPropagation()}>
            <div style={{...ST.drawTag,color:SECTIONS[drawnTask.section].color,borderColor:SECTIONS[drawnTask.section].color}}>{SECTIONS[drawnTask.section].label} · +{Math.round((drawnTask.xp!=null?drawnTask.xp:SECTIONS[drawnTask.section].xp)*((drawnRarity&&drawnRarity.mult)||1))} XP</div>
            {drawnRarity && <div style={{display:"inline-block",marginLeft:6,padding:"3px 12px",borderRadius:12,fontSize:11.5,fontWeight:700,color:"#fff",background:drawnRarity.color,marginBottom:10,verticalAlign:"top"}}>✦ {drawnRarity.label} ×{drawnRarity.mult}</div>}

            <p style={ST.hint}>Fulfil this and you grow {SECTIONS[drawnTask.section].reward}.</p>

              <button onClick={()=>{reshuffle();}} style={ST.ghost}>↻ Spin again</button>
              <button onClick={()=>setShowTaskPopup(false)} style={ST.ghost}>Close</button>
            </div>
          </div>
        </div>
      )}

      {/* "Order" result — a random wish, out for delivery */}
      {deliveryPick && (
        <div style={ST.modalWrap} onClick={()=>setDeliveryPick(null)}>
          <div style={{...ST.modalCard,maxWidth:300,textAlign:"center"}} onClick={e=>e.stopPropagation()}>

            <div style={{fontFamily:"Georgia,serif",fontSize:19,fontStyle:"italic",color:"#b84e36",margin:"14px 0"}}>{deliveryPick}</div>
            <p style={{fontSize:12,color:"#9a866f",fontStyle:"italic",lineHeight:1.6,margin:"0 0 12px"}}>Placed with the universe today. It ships in its own season — keep the porch light on.</p>
            <button onClick={()=>setDeliveryPick(null)} style={ST.ghost}>Close</button>
          </div>
        </div>
      )}

      {/* Skills milestone — add a LinkedIn skill */}
      {(reward?.section==="skills" || skillOpen) && (
        <div style={ST.modalWrap}>

            <p style={{fontSize:13,color:"#777",margin:"0 0 14px",lineHeight:1.5}}>You crossed a connection milestone. Name the skill the world now endorses you for.</p>
            <input style={ST.input} value={skillInput} onChange={e=>setSkillInput(e.target.value)}
              placeholder="e.g. Negotiation" autoFocus
              onKeyDown={e=>{if(e.key==="Enter")confirmSkill();}} />
            <div style={{display:"flex",flexWrap:"wrap",gap:7,margin:"10px 0 14px"}}>
              {SKILL_SUGGEST.map(sg=>(
                <button key={sg} onClick={()=>setSkillInput(sg)}
                  style={{background:"#f3f2ef",border:"1px solid #e3e3e3",borderRadius:999,padding:"6px 12px",fontSize:12,cursor:"pointer",color:"#444"}}>{sg}</button>
              ))}
            </div>
            <button onClick={confirmSkill} style={{...ST.primary,background:"#0a66c2",width:"100%",padding:"12px"}}>Add endorsement</button>
          </div>

      {/* Profile edit modal — Instagram handle / LinkedIn name, editable any time */}
      {profileModal && (

            <label style={{display:"block",fontSize:12,color:"#9a7a86",marginBottom:5}}>LinkedIn name</label>
            <input style={ST.input} value={liDraft} onChange={e=>setLiDraft(e.target.value)}

            {profileMsg && (
              <div style={{marginTop:10,fontSize:12.5,fontWeight:600,padding:"9px 12px",borderRadius:8,background:"#e7f7ec",color:"#1f7a44"}}>{profileMsg}</div>

            <div style={{display:"flex",gap:8,marginTop:16}}>
              <button onClick={()=>setProfileModal(false)} style={{...ST.chip,flex:1,textAlign:"center",justifyContent:"center"}}>Cancel</button>
              <button onClick={saveProfile} style={{...ST.primary,flex:1,padding:"12px"}}>Save</button>
            </div>
          </div>
        </div>

      {/* Cheque book modal */}

        <div style={ST.modalWrap} onClick={()=>{setChequeModal(false); setChequeMsg({text:"",kind:""});}}>
          <div style={{width:"100%",maxWidth:430,background:"#fff",borderRadius:18,overflow:"hidden",boxShadow:"0 30px 70px -20px rgba(0,0,0,.5)"}} onClick={e=>e.stopPropagation()}>
            <div style={{background:"#fdf6f0",borderBottom:"2px solid #d4a93f",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontFamily:"Georgia,serif",fontWeight:700,fontSize:17,color:"#cc1a1a"}}>HDFC Bank</div>
                <div style={{fontSize:11,color:"#9a7a86",letterSpacing:.5}}>PAY TO THE ORDER OF</div>
              </div>
              <button onClick={()=>{setChequeModal(false); setChequeMsg({text:"",kind:""});}} style={{background:"none",border:"none",fontSize:20,color:"#bbb",cursor:"pointer"}}>×</button>
            </div>
            <div style={{padding:20}}>
              <label style={{display:"block",fontSize:12,color:"#9a7a86",marginBottom:5}}>Payee</label>
              <input style={{...ST.input,marginBottom:14}} value={chequePayee} onChange={e=>setChequePayee(e.target.value)} placeholder="Ferrari Roma · Maldives trip · …"/>
              <label style={{display:"block",fontSize:12,color:"#9a7a86",marginBottom:5}}>Amount (₹)</label>
              <input style={ST.input} value={chequeAmt} onChange={e=>setChequeAmt(e.target.value)} placeholder="0" type="number"/>
              <div style={{fontSize:12,color:"#9a7a86",marginTop:8}}>Available: <span style={{color:"#cc1a1a",fontWeight:600}}>{fmtCompact(bankBalance(state.xp.business,state.cheques))}</span></div>
              {chequeMsg.text && (
                <div style={{marginTop:10,fontSize:12.5,fontWeight:600,padding:"9px 12px",borderRadius:8,background:chequeMsg.kind==="ok"?"#e7f7ec":"#fde4ec",color:chequeMsg.kind==="ok"?"#1f7a44":"#a32020"}}>{chequeMsg.text}</div>
              )}

/* ---- QUEST LOG — view all tasks, tick off (same reward), delete, progress bars ---- */
function QuestLog({ state, onComplete, onDelete, onToggleFocus }){
  const [open,setOpen]=useState(()=>SECTION_KEYS.reduce((a,k)=>(a[k]=true,a),{}));
  const focusActive=(state.focusDay===todayStr())?(state.focusIds||[]):[];
  const rank=(t)=>{ if(!taskAvailable(t)) return 4; const ds=dueStatus(t); if(ds==="overdue") return 0; if(ds==="today") return 1; if(focusActive.includes(t.id)) return 2; return 3; };
  return (
    <div>
      <p style={ST.lead}>Your life dashboard. Tick a quest to finish it — same reward as the gatcha. Star ☆ up to 3 as today's focus for ×1.5 XP ({focusActive.length}/3 starred).</p>
      {HAVEN_DISPLAY_ORDER.map(k=>{
        const tasks=[...state.tasks.filter(t=>t.section===k)].sort((a,b)=>rank(a)-rank(b));
        const xp=state.xp[k]||0;
        return (
          <div key={k} style={ST.logSection}>
            <div style={ST.logHead} onClick={()=>setOpen(o=>({...o,[k]:!o[k]}))}>
              <span style={{...ST.statDot,background:SECTIONS[k].color}} />
              <span style={ST.logTitle}>{SECTIONS[k].label}</span>
              <span style={ST.logCount}>{tasks.length>0?`${tasks.length}`:""}</span>
              <span style={ST.logChev}>{open[k]?"▾":"▸"}</span>
            </div>
            {/* progress toward next unlock — workspace categories (business/skills/creativity) track
                tasks-toward-next-reward instead of raw XP, since each task grants its reward instantly */}
            <div style={ST.barWrap}>
              <div style={{...ST.barFill, width:`${k==="reading"?readingPctInto(xp):k==="business"?businessPctInto(xp):isWorkspaceKey(k)?workspacePctInto(k,xp):pctInto(xp)}%`, background:SECTIONS[k].color}} />
            </div>
            <div style={ST.barLabel}>
              {k==="reading"
                ? `${readingXpInto(xp)} / ${READING_UNLOCK_STEP} XP → next unlock · ${booksDue(xp)} earned`
                : k==="business"
                  ? `${businessXpIntoCycle(xp)} / ${businessCadenceXp(xp)} XP → next reward · ${businessRewardsEarned(xp)} earned`
                  : isWorkspaceKey(k)
                    ? `${workspaceXpIntoCycle(k,xp)} / ${workspaceXpPerReward(k)} XP → next reward · ${workspaceRewardsEarned(k,xp)} earned`
                    : `${xpInto(xp)} / ${UNLOCK_STEP} XP → next unlock · ${stagesFor(xp)} earned`}
            </div>
            {open[k] && tasks.map(t=>{
              const av=taskAvailable(t);
              const ds=dueStatus(t);
              const isF=focusActive.includes(t.id);
              return (
              <div key={t.id} style={{...ST.logRow,opacity:av?1:0.55}}>
                <button onClick={()=>av&&onComplete(t)} style={{...ST.check,...(av?{}:{background:"#6f9a5e",borderColor:"#6f9a5e",color:"#fff",cursor:"default"})}} title={av?"Mark complete":"Done — resets "+(t.recur==="daily"?"tomorrow":"next week")}>✓</button>
                <span style={ST.logText}>
                  {t.text}
                  {t.recur && <span style={ST.miniBadge}>↻ {t.recur}</span>}
                  {av && ds==="overdue" && <span style={{...ST.miniBadge,color:"#b8432e",borderColor:"#e0b0a0",background:"#fbeae4"}}>⚠ overdue</span>}
                  {av && ds==="today" && <span style={{...ST.miniBadge,color:"#a07a1a",borderColor:"#e0cfa0",background:"#faf3dc"}}>due today</span>}
                  {av && ds==="later" && <span style={ST.miniBadge}>due {t.due.slice(5)}</span>}
                  {!av && <span style={{...ST.miniBadge,color:"#4a7a3a",borderColor:"#bcd8a8",background:"#eef6e4"}}>done — back {t.recur==="daily"?"tomorrow":"next week"}</span>}
                  {isF && av && <span style={{...ST.miniBadge,color:"#a5820b",borderColor:"#e0c060",background:"#fdf6d8"}}>★ ×1.5</span>}
                </span>
                {av && <button onClick={()=>onToggleFocus(t.id)} title="Star as today's focus (×1.5 XP)" style={{background:"none",border:"none",cursor:"pointer",fontSize:17,lineHeight:1,color:isF?"#e0a93f":"#d8c8a8",padding:"0 2px"}}>{isF?"★":"☆"}</button>}
                <span style={ST.logXp}>+{t.xp!=null?t.xp:SECTIONS[k].xp}</span>
                <button onClick={()=>onDelete(t.id)} style={ST.del} title="Delete">×</button>
              </div>);
            })}
            {open[k] && tasks.length===0 && <div style={ST.logEmpty}>no quests here yet</div>}
          </div>
        );
      })}
    </div>
  );
}

function fmtClock(ms){ const s=Math.max(0,Math.ceil(ms/1000)); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
function FocusTab({ timerEnd, timerLeft, timerMins, setTimerMins, timerSec, setTimerSec, onStart, onCancel }){

      <div style={{textAlign:"center"}}>

        <div style={{fontFamily:"Georgia,serif",fontSize:52,color:SECTIONS[timerSec].color,margin:"14px 0 8px",fontVariantNumeric:"tabular-nums"}}>{fmtClock(timerLeft)}</div>
        <div style={{...ST.barWrap,height:8,maxWidth:280,margin:"0 auto 8px"}}><div style={{...ST.barFill,width:`${pct*100}%`,background:SECTIONS[timerSec].color}}/></div>

        <button onClick={onCancel} style={ST.ghost}>Give up (no bonus)</button>

    );

  return (
    <div>
      <p style={ST.lead}>Run a distraction-free session. Finish it and the realm you choose earns bonus XP — 2 XP per minute.</p>
      <div style={ST.chipRow}>
        {[15,25,45].map(m=>(
          <button key={m} onClick={()=>setTimerMins(m)} style={{...ST.chip,borderColor:"#b84e36",background:timerMins===m?"#b84e36":"transparent",color:timerMins===m?"#fff":"#b84e36"}}>{m} min</button>
        ))}
      </div>
      <div style={ST.chipRow}>
        {HAVEN_DISPLAY_ORDER.map(k=>(
          <button key={k} onClick={()=>setTimerSec(k)} style={{...ST.chip,borderColor:SECTIONS[k].color,background:timerSec===k?SECTIONS[k].color:"transparent",color:timerSec===k?"#fff":SECTIONS[k].color}}>{SECTIONS[k].label}</button>
        ))}
      </div>
      <p style={ST.hint}>+{timerMins*2} XP · grows {SECTIONS[timerSec].reward}.</p>
      <button onClick={onStart} style={ST.primary}>Begin {timerMins}-minute session</button>

  );
}

/* ============================================================
   SCENE HOST — Phase 3: full painterly exterior
   Stone cottage at the hour, winding stream + lotuses, terraced
   flower garden + rose arch, vegetable greenhouse, treehouse,
   secret-garden gate, bees (always visible) + constellations by night,
   path lanterns, animated clickable gatcha. Real time-of-day.
   ============================================================ */
function timeOfDay(){
  try{ const ov=new URLSearchParams(location.search).get("tod"); if(ov&&["dawn","day","dusk","night"].includes(ov)) return ov; }catch(e){}
  const h=new Date().getHours();
  if(h>=5&&h<8) return "dawn"; if(h>=8&&h<17) return "day"; if(h>=17&&h<20) return "dusk"; return "night";
}

/* palette per time of day */
function palette(tod){
  switch(tod){
    case "dawn": return { sky:["#f9d2ad","#fbe3c4","#e9e2c2"], horizon:"#ffd9a0", orb:"#fff0d6", orbY:62, orbR:10, moon:false, star:0,
      tree1:"#3a5a44", tree2:"#4a7050", tree3:"#5c8a5e", grass1:"#7aa860", grass2:"#4a7a3a", water:"#86a6ac", roofL:"#7a808a", roofD:"#474d57", glow:0.45, win:0.6, stone:0 };
    case "day": return { sky:["#8fcfe8","#bfe6e0","#f4ecc6"], horizon:"#dff0d8", orb:"#fff8e0", orbY:26, orbR:11, moon:false, star:0,
      tree1:"#2f5a38", tree2:"#3d7048", tree3:"#4f8a56", grass1:"#6aa84e", grass2:"#3f7a32", water:"#5aa0b8", roofL:"#6a6f78", roofD:"#3e434c", glow:0.22, win:0.42, stone:0 };
    case "dusk": return { sky:["#cf8aa8","#e8a890","#f6c178"], horizon:"#ffb060", orb:"#ffd9a0", orbY:76, orbR:11, moon:false, star:0,
      tree1:"#2a4836",tree2:"#365c42",tree3:"#46704e", grass1:"#4a7048", grass2:"#34552e", water:"#3e5e6c", roofL:"#5e636e", roofD:"#343942", glow:0.72, win:0.9, stone:0.12 };
    default: return { sky:["#1e2a4a","#2e3a5e","#46395a"], horizon:"#5a4a6a", orb:"#eef2ff", orbY:30, orbR:9, moon:true, star:1,
      tree1:"#1e3326", tree2:"#26402e", tree3:"#2f5038", grass1:"#2e5238", grass2:"#1e3a26", water:"#1e3344", roofL:"#3a4150", roofD:"#21262f", glow:0.85, win:1, stone:0.22 };
  }
}

/* a tall conifer */
function Pine({ x, y, s=1, P }){

    <g transform={`translate(${x},${y}) scale(${s})`}>
      <rect x="-1.6" y="2" width="3.2" height="11" fill="#4a3424" />

      <path d="M0,-15 L12,6 L-12,6 Z" fill={P.tree3} />

/* a single lotus on the water */
function Lotus({ x, y, scale=1, i=0 }){
  const img = LOTUS_IMGS[i % LOTUS_IMGS.length];
  const w = 7.5, h = 7.5;
  return (
    <g transform={`translate(${x},${y}) scale(${scale})`}>
      <image href={img} x={-w/2} y={-h/2} width={w} height={h} style={{pointerEvents:"none"}}/>
      <animateTransform attributeName="transform" type="translate" additive="sum"
        values="0 0; 0.5 0.3; 0 0; -0.5 0.2; 0 0" dur={`${7+i%4}s`} repeatCount="indefinite" />
    </g>
  );
}

/* a single flower for the garden */
/* 6 real flower species — pixel-art assets (fuchsia, hydrangea, sunflower, rose, daisy, orchid) */
function Bloom({ x, y, kind=0, scale=1 }){
  const s = scale;
  const species = kind % FLOWER_IMGS.length;
  const H = 17, W = H * FLOWER_ASPECT[species]; // local footprint, bottom anchored at y=8 (stem foot)
  return (
    <g transform={`translate(${x},${y}) scale(${s})`}>

/* illustrated birds — robin, bluebird, goldfinch, wren, chaffinch */
// All birds fly the same rightward path. Verified pixel-by-pixel against the actual art:
// robin(0), wren(3), chaffinch(4) are drawn facing right already — untouched.
// bluebird(1) and goldfinch(2) are drawn facing LEFT — mirrored here (confirmed the flipped
// result visually faces right) so every bird in the flock faces the direction it's moving.
const FLYING_BIRD_FACES_LEFT = [false, true, true, false, false];
function Bird({ x, y, kind=0, flying }){
  if(flying){
    const img = FLYING_BIRD_IMGS[kind % FLYING_BIRD_IMGS.length];
    const flip = FLYING_BIRD_FACES_LEFT[kind % FLYING_BIRD_FACES_LEFT.length];
    const w = 10, h = 10;
    return (
      <g transform={`translate(${x},${y})`}>
        <g transform={flip ? "scale(-1,1)" : "translate(0,0)"}>
          <image href={img} x={-w/2} y={-h/2} width={w} height={h} style={{pointerEvents:"none"}}/>
        </g>
        <animateTransform attributeName="transform" type="translate" additive="sum"
          values="0 0; 3 -1.5; 6 -0.5; 9 -2; 12 -1" dur="6s" repeatCount="indefinite"/>
      </g>
    );
  }
  const img = BIRD_IMGS[kind % BIRD_IMGS.length];
  const w = 9, h = 9;
  return (
    <g transform={`translate(${x},${y})`}>
      <image href={img} x={-w/2} y={-h/2} width={w} height={h} style={{pointerEvents:"none"}}/>
    </g>
  );
}
