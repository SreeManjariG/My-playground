          <g>
            <rect x="150" y="50" width="46" height="9" rx="4.5" fill="#1a1410" opacity="0.72"/>
            <text fontFamily="Georgia,serif" fontSize="3.4" fill="#ffb066" x="173" y="56.2" textAnchor="middle">{bizLetters} biz letters ✉</text>
          </g>
        )}

        {/* === BACK BUTTON === */}
        <g onClick={()=>setView("exterior")} style={{cursor:"pointer"}}>
          <rect x="4" y="4" width="46" height="12" rx="6" fill="#1a1410" opacity="0.6"/>
          <text x="27" y="12.5" fontSize="5.5" fill="#fff3d0" textAnchor="middle" fontFamily="Georgia,serif">‹ outside</text>
        </g>

        {/* === FLASH XP === */}
        {flash && (flash.section==="business"||flash.section==="skills"||flash.section==="creativity") && (
          <text x="100" y="50" fontSize="8" textAnchor="middle" fill={SECTIONS[flash.section].color} fontFamily="Georgia,serif">
            + {SECTIONS[flash.section].label}!
            <animate attributeName="y" values="50;36" dur="1.9s"/>
            <animate attributeName="opacity" values="1;1;0" dur="1.9s"/>
          </text>
        )}
      </svg>
    );
  }

  if(view==="secret"){
    const ic = r.inner;
    const IMG_X = 25.2, IMG_Y = 7.2, IMG_W = 149.6, IMG_H = 149.6;
    /* Witch-room hotspots overlaid on the static PORTAL_IMG artwork, calibrated
       against the actual art (see portal_grid.png reference). */
    return (
      <svg viewBox="0 0 200 176" style={{width:"100%",height:"auto",display:"block",borderRadius:14}}>
        <defs>
          <linearGradient id="pg-bgsky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={P.sky[0]}/><stop offset="100%" stopColor={P.sky[1]}/>
          </linearGradient>
        </defs>

        <rect width="200" height="176" fill="url(#pg-bgsky)" opacity="0.15"/>
        <ellipse cx="100" cy="161" rx="100" ry="10" fill="#0a180a" opacity="0.2"/>

        {/* the witch room artwork — static scene, no day/night tint, no XP-driven visual changes */}
        <image href={PORTAL_IMG} x={IMG_X} y={IMG_Y} width={IMG_W} height={IMG_H}
          style={{pointerEvents:"none"}} preserveAspectRatio="xMidYMid meet"/>

        {/* ── HOTSPOT: mysterious book — always clickable ── */}
        <g onClick={onOpenDreamBook} style={{cursor:"pointer"}}>
          <rect x={IMG_X+IMG_W*0.375} y={IMG_Y+IMG_H*0.608333} width={IMG_W*0.166667} height={IMG_H*0.166667} fill="#000" opacity="0"/>
        </g>

        {/* ── HOTSPOT: time-travel portal — locked (not clickable) until 5000 Inner Child XP ── */}
        <g onClick={ic.portalUnlocked ? onOpenTimeTravel : undefined}
           style={{cursor: ic.portalUnlocked ? "pointer" : "default"}} opacity={ic.portalUnlocked?1:0.45}>
          <rect x={IMG_X+IMG_W*0.666667} y={IMG_Y+IMG_H*0.566667} width={IMG_W*0.166667} height={IMG_H*0.25} fill="#000" opacity="0"/>
        </g>

        {/* ── HOTSPOT: love potion pond — locked (not clickable) until 10000 Inner Child XP ── */}
        <g onClick={ic.pondUnlocked ? onOpenPotion : undefined}
           style={{cursor: ic.pondUnlocked ? "pointer" : "default"}} opacity={ic.pondUnlocked?1:0.45}>
          <rect x={IMG_X+IMG_W*0.541667} y={IMG_Y+IMG_H*0.816667} width={IMG_W*0.208333} height={IMG_H*0.166667} fill="#000" opacity="0"/>
        </g>

        {/* ── HOTSPOT: fortune ball — locked (not clickable) until 15000 Inner Child XP;
             draws from whatever dream-book entries have been written so far, book need not be full ── */}
        <g onClick={ic.fortuneUnlocked ? onOpenFortuneBall : undefined}
           style={{cursor: ic.fortuneUnlocked ? "pointer" : "default"}} opacity={ic.fortuneUnlocked?1:0.45}>
          <rect x={IMG_X+IMG_W*0.083333} y={IMG_Y+IMG_H*0.525} width={IMG_W*0.083333} height={IMG_H*0.083333} fill="#000" opacity="0"/>
        </g>

        {/* back button */}
        <g onClick={()=>setView("exterior")} style={{cursor:"pointer"}}>
          <rect x="4" y="4" width="52" height="12" rx="6" fill="#1a1410" opacity="0.6"/>
          <text x="30" y="12.5" fontSize="5.5" fill="#fff3d0" textAnchor="middle" fontFamily="Georgia,serif">‹ outside</text>
        </g>

        {flash && (flash.section==="innerChild" || flash.section==="spirituality") && (
          <text x="100" y="50" fontSize="8" textAnchor="middle" fill={SECTIONS[flash.section].color} fontFamily="Georgia,serif">
            + {SECTIONS[flash.section].label}!
            <animate attributeName="y" values="50;36" dur="1.9s"/>
            <animate attributeName="opacity" values="1;1;0" dur="1.9s"/>
          </text>
        )}
      </svg>
    );
  }

  return (
    <svg viewBox="0 0 200 176" style={{width:"100%",height:"auto",display:"block",borderRadius:14}}>
      <defs>
          <filter id="tint-night" x="-10%" y="-10%" width="120%" height="120%">
            <feFlood floodColor="#12136e" floodOpacity="0.55" result="flood"/>
            <feComposite in="flood" in2="SourceAlpha" operator="in" result="tint"/>
            <feBlend in="SourceGraphic" in2="tint" mode="multiply"/>
          </filter>
          <filter id="tint-dusk" x="-10%" y="-10%" width="120%" height="120%">
            <feFlood floodColor="#cf30e6" floodOpacity="0.20" result="flood"/>
            <feComposite in="flood" in2="SourceAlpha" operator="in" result="tint"/>
            <feBlend in="SourceGraphic" in2="tint" mode="screen"/>
          </filter>
          <radialGradient id="moon-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="#eef2ff" stopOpacity="0.35"/>
            <stop offset="60%" stopColor="#eef2ff" stopOpacity="0.10"/>
            <stop offset="100%" stopColor="#eef2ff" stopOpacity="0"/>
          </radialGradient>
          <radialGradient id="moonlight" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="#3f5fe0" stopOpacity="0.32"/>
            <stop offset="35%" stopColor="#3f5fe0" stopOpacity="0.16"/>
            <stop offset="70%" stopColor="#3f5fe0" stopOpacity="0.05"/>
            <stop offset="100%" stopColor="#3f5fe0" stopOpacity="0"/>
          </radialGradient>
          <radialGradient id="sky-cool-rays" cx="50%" cy="0%" r="75%">
            <stop offset="0%" stopColor="#2f4fc7" stopOpacity="0.45"/>
            <stop offset="45%" stopColor="#2f4fc7" stopOpacity="0.28"/>
            <stop offset="80%" stopColor="#2f4fc7" stopOpacity="0.10"/>
            <stop offset="100%" stopColor="#2f4fc7" stopOpacity="0"/>
          </radialGradient>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={P.sky[0]}/><stop offset="55%" stopColor={P.sky[1]}/><stop offset="100%" stopColor={P.sky[2]}/>
        </linearGradient>
        <radialGradient id="orb" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor={P.orb}/><stop offset="55%" stopColor={P.orb} stopOpacity="0.5"/><stop offset="100%" stopColor={P.orb} stopOpacity="0"/>
        </radialGradient>
        <linearGradient id="wall-side" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#425a42"/><stop offset="100%" stopColor="#567856"/>
        </linearGradient>
        <linearGradient id="wall-front" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#6a9068"/><stop offset="100%" stopColor="#507050"/>
        </linearGradient>
        <linearGradient id="roof-side" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#362010"/><stop offset="100%" stopColor="#4a2e18"/>
        </linearGradient>
        <linearGradient id="roof-front" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#5e3c1e"/><stop offset="100%" stopColor="#3c2210"/>
        </linearGradient>
        <linearGradient id="gh-roof-side" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#2e3830"/><stop offset="100%" stopColor="#3e4840"/>
        </linearGradient>
        <linearGradient id="gh-roof-top" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#b8d8d0" stopOpacity="0.7"/><stop offset="100%" stopColor="#88b0a8" stopOpacity="0.5"/>
        </linearGradient>
        <linearGradient id="garden-bg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={P.grass1}/><stop offset="100%" stopColor={P.grass2}/>
        </linearGradient>
        <linearGradient id="garden-fore" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={P.grass1} stopOpacity="0.8"/><stop offset="100%" stopColor="#1e4018"/>
        </linearGradient>
        <linearGradient id="stream-water" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#5a9ec8"/><stop offset="100%" stopColor="#2a6890"/>
        </linearGradient>
        <radialGradient id="hearthglow" cx="50%" cy="50%" r="60%">
          <stop offset="0%" stopColor={`rgba(255,200,110,${P.glow})`}/><stop offset="100%" stopColor="rgba(255,200,110,0)"/>
        </radialGradient>
        <pattern id="stone" width="8" height="5" patternUnits="userSpaceOnUse">
          <rect width="8" height="5" fill="#b8a890"/>
          <rect width="3.6" height="2.1" x="0.3" y="0.3" rx="0.5" fill="#c8b89c"/>
          <rect width="3.1" height="2.1" x="4.4" y="0.3" rx="0.5" fill="#a89880"/>
          <rect width="3.3" height="1.7" x="2.4" y="2.8" rx="0.4" fill="#c0b094"/>
        </pattern>
        <pattern id="roof-tile" width="5" height="4" patternUnits="userSpaceOnUse">
          <rect width="5" height="4" fill="none"/>
          <path d="M0,2 Q1.25,0 2.5,2 Q3.75,4 5,2" fill="none" stroke="#2a1808" strokeWidth="0.5" opacity="0.55"/>
          <line x1="0" y1="0" x2="5" y2="0" stroke="#2a1808" strokeWidth="0.3" opacity="0.35"/>
        </pattern>
      </defs>

      {/* ─── FULL-BLEED PAINTED BACKGROUND — lake, meadow, sky, all in one asset ─── */}
      <image href={EXTERIOR_BG_IMG} x="0" y="0" width="200" height="176"
        style={{pointerEvents:"none"}} preserveAspectRatio="xMidYMid slice"
        filter={night?"url(#tint-night)":dusky?"url(#tint-dusk)":undefined}/>
      {/* supplementary flat overlay — the filter alone reads too subtle against bright daytime art; this guarantees an obvious day/night difference, same technique as the Sky view */}
      {night && <rect width="200" height="176" fill="#0a1030" opacity="0.30" style={{pointerEvents:"none"}}/>}
      {/* cool blue rays irradiating from the sky at night — a soft gradient washing down from the top, cooling the whole scene rather than a flat overlay */}
      {night && <ellipse cx="100" cy="0" rx="150" ry="115" fill="url(#sky-cool-rays)" style={{pointerEvents:"none", mixBlendMode:"multiply"}}/>}
      {dusky && !night && <rect width="200" height="176" fill="#91179e" opacity="0.14" style={{pointerEvents:"none"}}/>}
      <g filter={night?"url(#tint-night)":dusky?"url(#tint-dusk)":undefined}>

      {/* ─── ZONE 1: SKY — constellations at night; bees replace the old birds by day. No tap/expand — always visible. ─── */}
      {(night || dusky) && r.env.constellations>0 && <Constellations count={r.env.constellations}/>}

      {/* lotus blossoms on the lake pads — Spirituality reward */}
      {LAKE_LOTUS_POSITIONS.slice(0, safe(r.spi.lotuses)).map((p,k)=>(
        <Lotus key={`ll${k}`} x={p.x} y={p.y} scale={1.15+0.5*((p.y-33)/45)} i={k} glow={dusky}/>
      ))}

      {/* ═══════════════════════════════════════════
          COTTAGE — AI-generated isometric asset (transparent bg)
          Image bounding box: x=48,y=34, w=104,h=113
          (aspect ratio 1668:1812 ≈ 0.92:1, taller than wide)
          Hotspots mapped from grid-overlay analysis
          ═══════════════════════════════════════════ */}

      {/* cottage, bench, character and gatcha machine are baked directly into EXTERIOR_BG_IMG — hotspots below are re-mapped to the actual artwork positions (verified against a fractional grid overlay of the source art) */}

      {/* ── HOTSPOT: arched gable window (frac x0.375-0.415,y0.245-0.335) → reading nook ── */}
      <g onClick={()=>setView("reading")} style={{cursor:"pointer"}}>
        <rect x="75" y="47" width="8" height="16" fill="#000" opacity="0"/>
        <rect x="70" y="43" width="18" height="3" rx="1.2" fill="#1a1410" opacity="0.45"/>
        <text x="79" y="45.2" fontFamily="Georgia,serif" fontSize="2.2" fill="#fff3d0" textAnchor="middle" fontStyle="italic">reading ↗</text>
      </g>

      {/* ── HOTSPOT: greenhouse potted-plant window (frac x0.62-0.80,y0.44-0.60) → workspace ── */}
      <g onClick={()=>setView("secret")} style={{cursor:"pointer"}}>
        <rect x="65" y="75" width="7" height="18.3" fill="#000" opacity="0"/>
        <rect x="62" y="71.2" width="14" height="2.8" rx="1.2" fill="#1a1410" opacity="0.45"/>
        <text x="69" y="73.5" fontFamily="Georgia,serif" fontSize="2" fill="#c8f0a0" textAnchor="middle" fontStyle="italic">the portal ↗</text>
      </g>

      {/* ── HOTSPOT: blue double door (frac x0.335-0.375,y0.435-0.535) → hallway ── */}
      <g onClick={()=>setView("workspace")} style={{cursor:"pointer"}}>
        <rect x="75" y="70" width="14" height="35" fill="#000" opacity="0"/>
        <rect x="75" y="66.2" width="14" height="3" rx="1.2" fill="#1a1410" opacity="0.45"/>
        <text x="82" y="68.5" fontFamily="Georgia,serif" fontSize="2.3" fill="#ffd0e0" textAnchor="middle" fontStyle="italic">workspace ↗</text>
      </g>

      {/* ── HOTSPOT: greenhouse (whole glass structure, frac x0.50-0.80,y0.20-0.62) ── */}
      <g onClick={()=>setView("greenhouse")} style={{cursor:"pointer"}}>
        <rect x="120" y="40" width="45" height="60" fill="#000" opacity="0"/>
        <rect x="118" y="36.2" width="22" height="3" rx="1.2" fill="#1a1410" opacity="0.45"/>
        <text x="129" y="38.5" fontFamily="Georgia,serif" fontSize="2.2" fill="#d0f0c0" textAnchor="middle" fontStyle="italic">greenhouse ↗</text>
      </g>

      {/* ── HOTSPOT: gatcha machine — the one and only gatcha now; rolls a task with a real spin (or spins again if one is already pending), then pops the drawn task up on screen ── */}
      <g onClick={()=>{ if(n===0){ setTab("gatcha"); return; } if(rolling) return; if(drawnTask){ reshuffle(); } else { onRoll(); } setTab("gatcha"); }} style={{cursor:"pointer"}}>
        <rect x="32" y="70" width="23" height="50" fill="#000" opacity="0"/>
        <rect x="32" y="66.2" width="23" height="3" rx="1.2" fill="#1a1410" opacity="0.45"/>
        <text x="43.5" y="68.5" fontFamily="Georgia,serif" fontSize="2.2" fill="#ffe8b0" textAnchor="middle" fontStyle="italic">
          {rolling ? "spinning…" : drawnTask ? "spin again ↗" : "draw a task ↗"}
        </text>
      </g>

      {/* dog — Relationships milestone, unlocked when small+big flowers together reach 30, curled up beside the bench */}
      {safe(r.rel.totalFlowers) >= 30 && (
        <image href={DOG_IMG} x="80" y="132" width="19" height="24" preserveAspectRatio="xMidYMid meet"/>
      )}

      {/* ─── ZONE 3: MEADOW — Relationships reward: small flowers scattered across open grass + both shorelines ─── */}
      {MEADOW_POSITIONS.slice(0, safe(r.rel.flowers)).map((p,i)=>(
        <Bloom key={`mw${i}`} x={p.x} y={p.y} kind={MEADOW_KINDS[i]} scale={0.75+0.65*((p.y-101)/75)}/>
      ))}
      {/* big garden-bed flower clusters — Relationships reward, 1 every 5,000 XP, positioned per Exterior full.png reference beds */}
      {BIG_FLOWER_POSITIONS.slice(0, safe(r.rel.bigFlowers)).map((p,i)=>{
        const idx = i % BIG_FLOWER_IMGS.length;
        const asp = BIG_FLOWER_ASPECT[idx];
        const H = BIG_FLOWER_BASE_H[idx] * BIG_FLOWER_SCALE[idx], W = H*asp;
        return (
          <image key={`bf${i}`} href={BIG_FLOWER_IMGS[idx]}
            x={p.x - W/2} y={p.y - H} width={W} height={H} preserveAspectRatio="xMidYMid meet"/>
        );
      })}
      {/* bees — Environment reward (formerly birds), in the garden among the flowers, same technique the old relationship-bees used. Visible at all times of day. Rendered after all flowers so they paint on top and stay visible. */}
      {r.env.bees>0 && BEE_POSITIONS.slice(0, safe(r.env.bees)).map((p,i)=>(
        <g key={`envbee${i}`} transform={`translate(${p.x},${p.y})`}>
          <image href={BEE_IMG} x="-2.3" y="-2" width="4.6" height="3.9" preserveAspectRatio="xMidYMid meet">
            <animateTransform attributeName="transform" type="translate" additive="sum"
              values="0 0;1.2 -0.8;0 0.4;-1 -0.5;0 0" dur={`${3+i*0.4}s`} repeatCount="indefinite"/>
          </image>
        </g>
      ))}
      {/* swan 1, facing right — Spirituality reward, unlocked at 7,000 XP */}
      {r.spi.swanRightUnlocked && (
        <image href={SWAN_R_IMG} x="8" y="38" width="17" height="12.8" preserveAspectRatio="xMidYMid meet"/>
      )}
      {/* swan 2, facing left — Spirituality reward, unlocked at 14,000 XP, completes the facing pair */}
      {r.spi.swanLeftUnlocked && (
        <image href={SWAN_L_IMG} x="24" y="39" width="17" height="12.8" preserveAspectRatio="xMidYMid meet"/>
      )}
      {/* swan 3 — Spirituality capstone reward, unlocked at 21,000 XP, shifted left and slightly lower to make room for the lotus at its old spot */}
      {r.spi.swanThirdUnlocked && (
        <image href={SWAN_R_IMG} x="140" y="30" width="15" height="11.3" preserveAspectRatio="xMidYMid meet"/>
      )}
      {dusky && [10,42,74,138,166,192].map((fx,i)=>(
        <g key={i}>
          <circle cx={fx} cy={160+i%3*4} r="0.9" fill="#fff3a0">
            <animate attributeName="cy" values={`${160+i%3*4};${150+i*2};${160+i%3*4}`} dur={`${5+i*0.4}s`} repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.12;0.95;0.12" dur={`${2.2+i%3*0.5}s`} repeatCount="indefinite"/>
          </circle>
        </g>
      ))}

      {/* flash */}
      {flash && (
        <text x="100" y="62" fontSize="8.5" textAnchor="middle" fontStyle="italic"
          fill={SECTIONS[flash.section].color} style={{paintOrder:"stroke",stroke:"#fffdf6",strokeWidth:1.3}}>
          + {SECTIONS[flash.section].label}!
          <animate attributeName="y" values="62;46" dur="1.9s"/>
          <animate attributeName="opacity" values="1;1;0" dur="1.9s"/>
        </text>
      )}
        </g>
      {/* full moon — night only, painted directly over the baked-in "sun" disc so it doesn't read as daytime at night */}
      {night && (
        <g>
          {/* moonlight — the moon acts as a light source: a large, soft gradient centered on it
              brightens the scene nearby and fades naturally with distance, rather than drawing visible rays */}
          <ellipse cx="172.5" cy="10.8" rx="140" ry="120" fill="url(#moonlight)" style={{mixBlendMode:"screen", pointerEvents:"none"}}/>
          <circle cx="172.5" cy="10.8" r="13" fill="url(#moon-glow)"/>
          <circle cx="172.5" cy="10.8" r="7.2" fill="#f2f2ea"/>
          <circle cx="170.2" cy="8.3" r="1.3" fill="#d8d8cc" opacity="0.6"/>
          <circle cx="175.1" cy="12.6" r="0.9" fill="#d8d8cc" opacity="0.55"/>
          <circle cx="174.0" cy="8.9" r="0.7" fill="#d8d8cc" opacity="0.5"/>
          <circle cx="172.5" cy="10.8" r="9.5" fill="#dce4f5" opacity="0.18"/>
        </g>
      )}
      
    </svg>
  );
}





/* ============================================================
   STYLES
   ============================================================ */
const SERIF="'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif";
const ST={
  authWrap:{minHeight:"100vh",display:"grid",placeItems:"center",padding:"20px",background:"radial-gradient(130% 90% at 50% 0%, #bfe6e0, #e8dcc0)"},
  authCard:{width:"100%",maxWidth:380,background:"#fdf6e8",borderRadius:22,padding:"30px 24px",border:"1px solid #e6d6b8",boxShadow:"0 10px 40px rgba(90,70,40,0.15)",textAlign:"center"},
  crest:{fontSize:30,color:"#e0a93f"}, authTitle:{fontSize:28,fontStyle:"italic",margin:"6px 0 2px",color:"#b84e36"},
  authSub:{fontSize:13,color:"#9a866f",fontStyle:"italic",margin:"0 0 18px"},
  localNote:{fontSize:12.5,color:"#7d6d5a",background:"#f6ecd6",borderRadius:12,padding:"12px 14px",lineHeight:1.5,marginBottom:16,textAlign:"left"},
  segRow:{display:"flex",gap:6,marginBottom:14},
  seg:{flex:1,padding:"9px",borderRadius:12,border:"1px solid #e0cfa8",background:"transparent",fontFamily:SERIF,fontSize:13,color:"#9a866f",cursor:"pointer"},
  segOn:{background:"#b84e36",color:"#fff",borderColor:"#b84e36",fontWeight:600},
  input:{width:"100%",padding:"12px 14px",marginBottom:10,borderRadius:12,border:"1px solid #e3d2b4",background:"#fffdf8",fontFamily:SERIF,fontSize:15,color:"#3a2e24",boxSizing:"border-box"},
  authErr:{fontSize:12.5,color:"#b84e36",marginBottom:8,textAlign:"left"},
  authBtn:{width:"100%",padding:"13px",marginTop:4,borderRadius:22,border:"none",background:"#d4654a",color:"#fff",fontFamily:SERIF,fontSize:15,fontWeight:600,cursor:"pointer"},
  linkBtn:{display:"block",width:"100%",marginTop:12,background:"none",border:"none",color:"#9a866f",fontFamily:SERIF,fontSize:12.5,fontStyle:"italic",cursor:"pointer",textDecoration:"underline"},
  shell:{background:"#fdf6e8",minHeight:"100vh",color:"#3a2e24"},
  header:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 16px 8px"},
  title:{fontSize:23,fontStyle:"italic",color:"#b84e36",lineHeight:1}, sub:{fontSize:12,color:"#9a866f",fontStyle:"italic",marginTop:3},
  signOut:{background:"transparent",border:"1px solid #e0cfa8",borderRadius:16,padding:"6px 12px",fontFamily:SERIF,fontSize:12,color:"#9a866f",cursor:"pointer"},
  stage:{padding:"4px 12px 0",background:"radial-gradient(120% 90% at 50% 12%, #fcf8ec, #f3ead4)"},
